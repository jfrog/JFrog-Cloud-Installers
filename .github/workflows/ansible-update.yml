name: Auto Update Ansible Collection

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if versions are the same (optional)'
        required: false
        default: false
        type: boolean

jobs:
  check-ansible-update:
    name: Check for Ansible update
    runs-on: ubuntu-latest
    env:
      ARTIFACTORY_URL: "https://releases.jfrog.io/artifactory/ansible/collections/jfrog/platform/"
    outputs:
      update-available: ${{ steps.check.outputs.ansible-update-available }}
      current-version: ${{ steps.check.outputs.current-ansible-version }}
      latest-version: ${{ steps.check.outputs.latest-ansible-version }}
      update-summary: ${{ steps.check.outputs.update-summary }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq
          sudo curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Run Ansible collection update check
        id: check
        run: |
          chmod +x .github/workflows/check_updates.sh
          .github/workflows/check_updates.sh
        env:
          FORCE_UPDATE: ${{ inputs.force_update }}

  update-ansible-collection:
    name: Update Ansible Collection
    needs: check-ansible-update
    if: needs.check-ansible-update.outputs.update-available == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo curl -sL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update and Create PR for collection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACTORY_URL: "https://releases.jfrog.io/artifactory/ansible/collections/jfrog/platform/"
        run: |
          # Configure git
          git config --global user.name "IN-Automation"
          git config --global user.email "in-automation@jfrog.com"

          # Set variables
          WORKSPACE_DIR="$PWD"
          VERSION="${{ needs.check-ansible-update.outputs.latest-version }}"
          TIMESTAMP=$(TZ='Asia/Kolkata' date +%Y%m%d-%H%M%S)
          BRANCH="platform-$VERSION-$TIMESTAMP"
          COLLECTION_DIR="$WORKSPACE_DIR/Ansible/ansible_collections/jfrog/platform"

          # Create labels if they don't exist
          gh label create automated --color "0E8A16" --description "Automated changes" || true
          gh label create update --color "1D76DB" --description "Update pull request" || true
          

          # Create new branch
          git checkout -b "$BRANCH" "${{ github.event.repository.default_branch }}"

          # Backup and update galaxy.yml before cleaning
          if [ -f "$COLLECTION_DIR/galaxy.yml" ]; then
            # Backup existing galaxy.yml
            cp "$COLLECTION_DIR/galaxy.yml" "${WORKSPACE_DIR}/galaxy.yml.backup"
            echo "Backed up existing galaxy.yml"
          fi

          # Remove old content
          rm -rf "$COLLECTION_DIR"/*
          
          # Restore and update galaxy.yml
          if [ -f "${WORKSPACE_DIR}/galaxy.yml.backup" ]; then
            cp "${WORKSPACE_DIR}/galaxy.yml.backup" "$COLLECTION_DIR/galaxy.yml"
            # Update version in galaxy.yml
            sed -i "s/^version: .*/version: \"${VERSION}\"/" "$COLLECTION_DIR/galaxy.yml"
            echo "Restored galaxy.yml and updated version to ${VERSION}"
          else
            echo "No existing galaxy.yml to restore"
            exit 1
          fi
          
          echo "📦 Downloading collection: ${ARTIFACTORY_URL}${VERSION}/jfrog-platform-${VERSION}.tar.gz"

          curl -Lf -o "${WORKSPACE_DIR}/platform.tar.gz" "${ARTIFACTORY_URL}${VERSION}/jfrog-platform-${VERSION}.tar.gz" || {
            echo "Failed to download collection from Artifactory"
            exit 1
          }

          [ -s "${WORKSPACE_DIR}/platform.tar.gz" ] || {
            echo "Downloaded file is empty"
            exit 1
          }

          mkdir -p "${WORKSPACE_DIR}/tmp"
          tar -xzf "${WORKSPACE_DIR}/platform.tar.gz" -C "${WORKSPACE_DIR}/tmp" || {
            echo "Failed to extract collection (invalid tar.gz)"
            head -n 5 "${WORKSPACE_DIR}/platform.tar.gz"
            exit 1
          }
          
          # List contents to debug
          echo "Extracted contents:"
          ls -la tmp/

          # Copy contents (preserve galaxy.yml)
          cp -r "${WORKSPACE_DIR}/tmp/"* "$COLLECTION_DIR/"
          
          # List contents after copy to debug
          echo "Collection directory contents:"
          ls -la "$COLLECTION_DIR/"

          # Remove unwanted files
          rm -f "$COLLECTION_DIR/FILES.json" "$COLLECTION_DIR/MANIFEST.json"
          
          # Fix whitespace issues in specific files
          XRAY_DEFAULTS_FILE="$COLLECTION_DIR/roles/xray/defaults/main.yml"
          if [ -f "$XRAY_DEFAULTS_FILE" ]; then
            echo "Normalizing whitespace in xray defaults file"
            # Fix the yum_python_interpreter line specifically
            sed -i 's/yum_python_interpreter:[[:space:]]*>-[[:space:]]*/yum_python_interpreter: >-/' "$XRAY_DEFAULTS_FILE"
          fi

          # Verify galaxy.yml exists and is not empty
          if [ ! -s "$COLLECTION_DIR/galaxy.yml" ]; then
            echo "Error: galaxy.yml is missing or empty"
            exit 1
          fi

          # Clean up temporary files
          rm -rf "${WORKSPACE_DIR}/tmp" "${WORKSPACE_DIR}/platform.tar.gz" "${WORKSPACE_DIR}/galaxy.yml.backup"

          # Configure git to ignore whitespace changes
          git config core.autocrlf false
          git config core.whitespace trailing-space,space-before-tab
          git config apply.whitespace fix
          
          # Add changes and create commit (ignore whitespace-only changes)
          git add "$COLLECTION_DIR"
          
          # Check if there are any non-whitespace changes
          if git diff --cached --ignore-space-change --ignore-all-space --ignore-blank-lines --quiet; then
            echo "Only whitespace changes detected, skipping commit"
            git reset HEAD "$COLLECTION_DIR"
          elif git commit -m "[ansible] JFrog Platform ${VERSION} release"; then
              # Push the update branch
              git push origin "$BRANCH"

              # Create PR with detailed information. Created before the
              # release so its number can be linked from the release notes'
              # "Full Changelog" line.
              TITLE="[ansible] JFrog Platform ${VERSION} release"
              BODY="## Ansible Collection Update Details

              🔄 Updating JFrog Platform Ansible Collection
              - Version: ${VERSION}
              - Previous Version: ${{ needs.check-ansible-update.outputs.current-version }}

              This is an automated update by the JFrog Ansible Collection update workflow."

              PR_URL=$(gh pr create \
                --title "$TITLE" \
                --body "$BODY" \
                --base "${{ github.event.repository.default_branch }}" \
                --head "$BRANCH" \
                --label "automated" \
                --label "ansible")
              PR_NUMBER="${PR_URL##*/}"

              echo "Successfully created PR for Ansible Collection update: $PR_URL"

              # Generate full release notes (changelog delta, dependency
              # version summary, official docs links, Full Changelog link to
              # this PR's diff) from releases.jfrog.io (the collection
              # itself) artifactory, xray,
              # distribution).
              TAG="ansible-platform-${VERSION}"
              NOTES_FILE="$(mktemp)"
              chmod +x .github/workflows/generate_ansible_release_notes.sh
              .github/workflows/generate_ansible_release_notes.sh \
                "$VERSION" "${{ needs.check-ansible-update.outputs.current-version }}" "$PR_NUMBER" > "$NOTES_FILE"

              # Create the GitHub release; this creates the tag at the
              # branch commit. No standalone tag is pushed separately.
              gh release create "$TAG" \
                --target "$BRANCH" \
                --title "[ansible] JFrog Platform ${VERSION}" \
                --notes-file "$NOTES_FILE" \
                || echo "::warning::Release for $TAG may already exist"
              rm -f "$NOTES_FILE"

              # Auto-merge only when the changelog has no GitHub references
              # (e.g. "GH-2177"). Those usually point at issues/PRs a human
              # should review, so leave such PRs open. Only the changelog
              # entries added by this update are inspected.
              CHANGELOG_FILE="$COLLECTION_DIR/CHANGELOG.md"
              if git show HEAD -- "$CHANGELOG_FILE" | grep -E '^\+' | grep -qE 'GH-[0-9]+'; then
                echo "::notice::Changelog contains GitHub references (GH-...); leaving PR open for manual review"
              else
                echo "No GitHub references in changelog; auto-merging PR"
                gh pr merge "$PR_URL" --squash --delete-branch \
                  || echo "::warning::auto-merge failed (checks/permissions?); PR left open"
              fi
          else
              echo "No meaningful changes detected for Ansible Collection"
              # Clean up the branch if no changes
              git checkout "${{ github.event.repository.default_branch }}"
              git branch -D "$BRANCH"
          fi

          # Return to default branch
          git checkout "${{ github.event.repository.default_branch }}"
