---

node_templates:

  jfrog_platform:
    type: dell.nodes.ServiceComponent
    properties:
      resource_config:
        blueprint:
          id: { get_input: [blueprint_ids, jfrog_platform] }
          external_resource: true
          revision_id: { get_input: jfrog_platform_revision_id }
        deployment:
          id:
            concat:
              - { get_sys: [deployment, id] }
              - "-jfrog-platform"
          display_name:
            concat:
              - { get_sys: [deployment, name] }
              - "-jfrog-platform"
          inputs:
            k8s_credentials: { get_input: k8s_credentials }
            target_deployment_id: { get_input: target_deployment_id }
            namespace: { get_input: namespace }
            release_name: { get_input: release_name }
            chart_version: { get_input: chart_version }
            sizing_template: { get_input: sizing_template }
            jfrog_helm_repo_url: { get_input: jfrog_helm_repo_url }
            persistence: { get_input: persistence }
            persistence_type: { get_input: persistence_type }
            filesystem_cache_enabled: { get_input: filesystem_cache_enabled }
            storage_class: { get_input: storage_class }
            pvc_access_mode: { get_input: pvc_access_mode }
            pvc_size: { get_input: pvc_size }
            nfs_ip: { get_input: nfs_ip }
            nfs_capacity: { get_input: nfs_capacity }
            postgresql_enabled: { get_input: postgresql_enabled }
            apply_bundled_db_secret: { get_attribute: [input_validator, capabilities, apply_bundled_db_secret_int] }
            apply_external_db_secret: { get_attribute: [input_validator, capabilities, apply_external_db_secret_int] }
            database_admin_password: { get_input: database_admin_password }
            database_credentials: { get_input: database_credentials }
            database_host: { get_input: database_host }
            database_port: { get_input: database_port }
            database_ssl_mode: { get_input: database_ssl_mode }
            apply_license_secret: { get_attribute: [input_validator, capabilities, apply_license_secret_int] }
            license_secret_ref: { get_input: license_secret_ref }
            apply_master_key_secret: { get_attribute: [input_validator, capabilities, apply_master_key_secret_int] }
            master_key_secret_ref: { get_input: master_key_secret_ref }
            apply_join_key_secret: { get_attribute: [input_validator, capabilities, apply_join_key_secret_int] }
            join_key_secret_ref: { get_input: join_key_secret_ref }
            nginx_enabled: { get_input: nginx_enabled }
            discover_lb_endpoint: { get_attribute: [input_validator, capabilities, discover_lb_endpoint] }
            ingress_enabled: { get_input: ingress_enabled }
            ingress_class_name: { get_input: ingress_class_name }
            ingress_host: { get_input: ingress_host }
            ingress_annotations: { get_input: ingress_annotations }
            ingress_tls_enabled: { get_input: ingress_tls_enabled }
            ingress_tls_secret_ref: { get_input: ingress_tls_secret_ref }
            create_ingress_tls_secret: { get_attribute: [input_validator, capabilities, ingress_tls_enabled_int] }
    relationships:
      - type: dell.relationships.depends_on
        target: input_validator
      - type: dell.relationships.depends_on
        target: stack_verifier
