---

capabilities:

  release_name:
    description: Name of the deployed Helm release
    value: { get_input: release_name }

  namespace:
    description: Kubernetes namespace of the deployment
    value: { get_input: namespace }

  sizing:
    description: Applied sizing template
    value: { get_input: sizing_template }

  chart_version:
    description: jfrog/jfrog-platform Helm chart version pinned by this bundle
    value: { get_input: chart_version }

  platform_url_ingress:
    description: >-
      Artifactory URL when using Kubernetes Ingress mode. Populated only when
      ingress_enabled is true; empty in bundled NGINX (LoadBalancer) mode.
    value: { get_attribute: [jfrog_platform, capabilities, platform_url_ingress] }

  platform_url_loadbalancer:
    description: >-
      Artifactory URL when using bundled NGINX (LoadBalancer) mode
      (external IP:port of the artifactory-nginx Service). Empty in Ingress mode.
    value: { get_attribute: [jfrog_platform, capabilities, platform_url_loadbalancer] }
