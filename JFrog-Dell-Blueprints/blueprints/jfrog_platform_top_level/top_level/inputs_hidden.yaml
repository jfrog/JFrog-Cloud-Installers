---

inputs:

  blueprint_ids:
    type: dict
    hidden: true
    allow_update: false
    required: true
    display_label: Blueprint IDs
    description: >-
      Mapping from logical component name to catalog blueprint ID.
      Resolved from manifest.yaml at deployment time.
    default:
      input_validator: jfrog_input_validator
      stack_verifier: jfrog_stack_verifier
      jfrog_platform: jfrog_platform_component

  input_validator_revision_id:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Input Validator Revision ID
    description: Revision of the input validator component blueprint to deploy.
    default: "1.0.0.0"
    constraints:
      - pattern: '^\d+\.\d+\.\d+\.\d+$'
        error_message: Must be a 4-part revision (MAJOR.MINOR.PATCH.BUILD).

  stack_verifier_revision_id:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Stack Verifier Revision ID
    description: Revision of the stack verifier component blueprint to deploy.
    default: "1.0.0.0"
    constraints:
      - pattern: '^\d+\.\d+\.\d+\.\d+$'
        error_message: Must be a 4-part revision (MAJOR.MINOR.PATCH.BUILD).

  jfrog_platform_revision_id:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: JFrog Platform Revision ID
    description: Revision of the JFrog Platform component blueprint to deploy.
    default: "1.0.0.0"
    constraints:
      - pattern: '^\d+\.\d+\.\d+\.\d+$'
        error_message: Must be a 4-part revision (MAJOR.MINOR.PATCH.BUILD).

  blueprint_job_image:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Stack Verifier Job Image
    description: >-
      Image used by the stack verifier Kubernetes Job, given as
      image/path:tag, image/path@sha256:<digest>, or
      image/path:tag@sha256:<digest>. Digest pinning is recommended for
      supply-chain integrity (the tag stays human-readable while the digest
      is authoritative). Pulled from container_registry_name.
    default: "dtzar/helm-kubectl@sha256:d02d8d02a24d67e4851503cc443e7eb2358383c9c052f699c262409cd05dae55"
    constraints:
      - pattern: '^[a-zA-Z0-9][a-zA-Z0-9\-\._/]*(:[a-zA-Z0-9][a-zA-Z0-9\-\._]*(@sha256:[a-f0-9]{64})?|@sha256:[a-f0-9]{64})$'
        error_message: Must be image/path:tag, image/path@sha256:<digest>, or image/path:tag@sha256:<digest>.

  k8s_min_version:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Minimum Kubernetes Version
    description: Minimum Kubernetes server version the stack verifier will accept.
    default: "v1.30"
    constraints:
      - pattern: '^v\d+\.\d+(\.\d+)?$'
        error_message: Must be a Kubernetes version like v1.30 or v1.30.5.

  min_ready_nodes:
    type: integer
    hidden: true
    allow_update: false
    required: true
    display_label: Minimum Ready Nodes
    description: Minimum number of Ready nodes the stack verifier will accept.
    default: 1
    constraints:
      - in_range: [1, 10]
        error_message: Must be between 1 and 10.

  chart_version:
    type: string
    hidden: true
    allow_update: true
    required: true
    display_label: Chart Version
    description: >-
      jfrog/jfrog-platform Helm chart version. Injected automatically
      by the build pipeline from the resolved chart version; not
      customer-editable.
    default: 0.0.0
    constraints:
      - pattern: '^\d+\.\d+\.\d+$'
        error_message: Must be a valid semantic version.

  k8s_deployment_constraints:
    type: dict
    hidden: true
    allow_update: false
    display_label: K8s Deployment Constraints
    description: >-
      Internal mapping from target_type to the DAP deployment-id label
      used to discover the target Kubernetes infrastructure deployment.
      Build-time pinned; not customer-editable.
    default:
      AI: "dellprivatecloudcluster"
      External: "kubernetes"

  # [air-gapped] Credentials for pulling the verifier image from an
  # internal / private container registry.
  container_registry_credentials_secret:
    type: secret_key
    hidden: true
    allow_update: false
    required: false
    display_label: Container Registry Credentials Secret
    description: >-
      DAP general secret containing a JSON object with 'username' and
      'password' for pulling the stack verifier container image from a
      private registry. Leave empty when using a public registry
      (e.g., docker.io).
    constraints:
      - type: general
        error_message: Secret must be of type general (JSON with username/password).

  # [air-gapped] Override with an internal Helm repo mirror for the
  # JFrog Platform chart in disconnected environments.
  jfrog_helm_repo_url:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: JFrog Helm Repository
    description: >-
      Helm repository URL for the JFrog Platform chart. Override with
      an internal mirror URL for air-gapped deployments.
    default: https://charts.jfrog.io
    constraints:
      - pattern: '^https?://.+'
        error_message: Must be a valid HTTP/HTTPS URL.


  # [air-gapped] Override with an internal container registry hostname
  # for the stack verifier image in disconnected environments.
  container_registry_name:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Container Registry Hostname
    description: >-
      Container registry used to pull the stack verifier image
      (default: docker.io). Override with an internal registry
      hostname for air-gapped deployments.
    default: docker.io
    constraints:
      - pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-\.:]*[a-zA-Z0-9])?$'
        error_message: Must be a valid registry hostname (optionally with port).

  # [air-gapped] Set to true to pull the verifier image from a private /
  # internal registry (creates an image-pull Secret).
  create_pull_secret:
    type: string
    hidden: true
    allow_update: false
    required: false
    display_label: Pull Stack Verifier Image From Private Registry
    description: >-
      Controls whether the stack verifier creates an image-pull Secret
      for its container image. true = private registry (create the Secret
      from container_registry_credentials_secret and attach it to the
      verification Job). false = public registry (skip the Secret and pull
      anonymously). Leave false when container_registry_name is a public
      registry such as docker.io.
    default: "false"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true (private registry) or false (public registry).
