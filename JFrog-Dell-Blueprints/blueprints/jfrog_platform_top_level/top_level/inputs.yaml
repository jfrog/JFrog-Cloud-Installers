---

input_groups:
  credentials:
    display_label: k8s_target_cluster
    collapsible: true
    index: 0
    inputs:
      - target_type
      - target_deployment_id
      - k8s_credentials
  infrastructure:
    display_label: Infrastructure
    collapsible: true
    index: 1
    inputs:
      - namespace
  persistence:
    display_label: Persistence
    collapsible: true
    index: 2
    inputs:
      - persistence
      - persistence_type
      - filesystem_cache_enabled
      - storage_class
      - pvc_access_mode
      - pvc_size
      - nfs_ip
      - nfs_capacity
  database:
    display_label: Database Configuration
    collapsible: true
    index: 3
    inputs:
      - postgresql_enabled
      - create_bundled_db_secret
      - create_external_db_secret
      - database_admin_password
      - database_host
      - database_port
      - database_ssl_mode
      - database_credentials
  chart_settings:
    display_label: Chart Settings
    collapsible: true
    index: 4
    inputs:
      - release_name
      - create_master_key_secret
      - master_key_secret_ref
      - create_join_key_secret
      - join_key_secret_ref
  licensing:
    display_label: Sizing and Licensing
    collapsible: true
    index: 5
    inputs:
      - sizing_template
      - create_license_secret
      - license_secret_ref
  networking:
    display_label: Ingress
    collapsible: true
    index: 6
    inputs:
      - nginx_enabled
      - ingress_enabled
      - ingress_class_name
      - ingress_host
      - ingress_tls_enabled
      - ingress_tls_secret_ref
      - ingress_annotations

inputs:

  target_type:
    type: string
    constraints:
      - valid_values:
          - External
          - AI
        error_message: Must be 'External' or 'AI'.
    hidden: false
    allow_update: false
    display_label: Target Kubernetes Type
    description: >
      Select the target Kubernetes environment type. Options: 'AI' for integrated AI clusters, 'External' for other Kubernetes clusters.
    display:
      group: k8s_target_cluster
      index: 0

  target_deployment_id:
    type: deployment_id
    constraints:
      - labels:
          - external-infrastructure: { get_input: [ k8s_deployment_constraints, { get_input: target_type } ] }
        error_message: Must be a deployment labelled as matching external Kubernetes infrastructure.
    hidden: false
    allow_update: false
    display_label: Target Kubernetes Deployment
    required: true
    description: |
      The Deployment ID of the target Kubernetes cluster.
    display:
      group: k8s_target_cluster
      index: 1

  # -- Credentials -------------------------------------------------
  k8s_credentials:
    type: secret_key
    hidden: false
    allow_update: false
    required: true
    display_label: Cluster Access Secret
    description: |
      Secret name containing details needed for Kubernetes cluster.
      Required keys: host, port, verify_ssl, ssl_ca_cert.
      For verify_ssl='TLS': also requires cert_file, key_file.
      For verify_ssl='Token': also requires token.
    constraints:
      - type: k8s
        error_message: Secret must be of type 'k8s' containing cluster access details.
    display:
      group: k8s_target_cluster
      index: 2

  # -- Infrastructure ----------------------------------------------
  namespace:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Kubernetes Namespace
    description: Target namespace for JFrog Platform (created if it does not exist).
    default: jfrog-platform
    constraints:
      - pattern: '^[a-z0-9][a-z0-9\-]{0,62}$'
        error_message: Must be a valid Kubernetes namespace name.
    display:
      group: infrastructure
      index: 0

  # -- Persistence -------------------------------------------------
  persistence:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Persistence
    description: >-
      storage-type: Select a persistence type (file-system or nfs).
      storage-class: PVC-backed storage using a Kubernetes StorageClass.
    default: storage-class
    constraints:
      - valid_values:
          - storage-type
          - storage-class
        error_message: Must be storage-type or storage-class.
    display:
      group: persistence
      index: 0

  persistence_type:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Persistence Type
    description: >-
      file-system: local or PVC-backed file storage.
      nfs: external NFS server mount.
    default: file-system
    only_with:
      persistence: storage-type
    constraints:
      - valid_values:
          - file-system
          - nfs
        error_message: Must be file-system or nfs.
    display:
      group: persistence
      index: 1

  filesystem_cache_enabled:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: File-System Cache Enabled
    description: Enable Artifactory's local file-system cache layer.
    default: "false"
    only_with:
      persistence: storage-type
      persistence_type: file-system
    constraints:
      - valid_values:
          - "true"
          - "false"
        error_message: Must be true or false.
    display:
      group: persistence
      index: 2

  storage_class:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Storage Class
    description: Kubernetes StorageClass name for persistent volumes. Leave empty to use cluster default.
    default: ""
    only_with:
      persistence: storage-class
    constraints:
      - pattern: '^$|^[a-z0-9][a-z0-9\-]*$'
        error_message: Must be empty or a valid StorageClass name.
    display:
      group: persistence
      index: 3

  pvc_access_mode:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: PVC Access Mode
    description: Access mode for the PersistentVolumeClaim.
    default: ReadWriteOnce
    only_with:
      persistence: storage-class
    constraints:
      - valid_values:
          - ReadWriteOnce
          - ReadWriteMany
          - ReadOnlyMany
        error_message: Must be ReadWriteOnce, ReadWriteMany, or ReadOnlyMany.
    display:
      group: persistence
      index: 4

  pvc_size:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: PVC Size
    description: Storage default size. Should be increased for production deployments.
    default: "20Gi"
    only_with:
      persistence: storage-class
    constraints:
      - pattern: '^[0-9]+(Gi|Ti|Mi|G|T|M)$'
        error_message: Must be a valid Kubernetes storage size (e.g., 20Gi, 100Gi).
    display:
      group: persistence
      index: 5

  nfs_ip:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: NFS Server IP
    description: IP address of the external NFS server.
    default: ""
    only_with:
      persistence: storage-type
      persistence_type: nfs
    constraints:
      - pattern: '^$|^(\d{1,3}\.){3}\d{1,3}$'
        error_message: Must be empty or a valid IPv4 address.
    display:
      group: persistence
      index: 6

  nfs_capacity:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: NFS Capacity
    description: Storage capacity for NFS mount (e.g., 200Gi).
    default: "200Gi"
    only_with:
      persistence: storage-type
      persistence_type: nfs
    constraints:
      - pattern: '^[0-9]+(Gi|Ti|Mi|G|T|M)$'
        error_message: Must be a valid Kubernetes storage capacity (e.g., 200Gi, 1Ti).
    display:
      group: persistence
      index: 7

  # -- Database ----------------------------------------------------
  postgresql_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Bundled PostgreSQL
    description: >-
      When true, the bundled PostgreSQL subchart is deployed. Defaults
      to false (connect to an external PostgreSQL instance); set to true
      only for trial / dev / single-replica deployments.
    default: "false"
    constraints:
      - valid_values:
          - "true"
          - "false"
        error_message: Must be true or false.
    display:
      group: database
      index: 0

  create_bundled_db_secret:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Create Bundled Database Secret
    description: >-
      Create a K8s secret with default bundled PostgreSQL credentials
      (postgres / artifactory / artifactory). true = create, false = skip.
      WARNING: these are well-known default credentials for TRIAL / DEV use
      only - do NOT use bundled mode for production. For production set
      Bundled PostgreSQL to false and provide credentials via DAP secrets.
    default: "false"
    only_with:
      postgresql_enabled: "true"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true (create) or false (skip).
    display:
      group: database
      index: 1

  create_external_db_secret:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Create External Database Secret
    description: >-
      Create a K8s secret with credentials from DAP secrets below.
      true = create, false = skip.
    default: "false"
    only_with:
      postgresql_enabled: "false"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true (create) or false (skip).
    display:
      group: database
      index: 2

  database_admin_password:
    type: secret_key
    hidden: false
    allow_update: false
    required: true
    display_label: Database Admin Password
    description: >-
      DAP general secret holding the PostgreSQL admin (superuser) password.
      Used by the init container to create product databases.
    only_with:
      postgresql_enabled: "false"
    constraints:
      - type: general
        error_message: Secret must be of type general.
    display:
      group: database
      index: 3

  database_host:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Host
    description: >-
      Hostname of the PostgreSQL server. Default matches the bundled
      subchart service name. Override for external databases.
    default: jfrog-platform-postgresql
    only_with:
      postgresql_enabled: "false"
    constraints:
      - pattern: '^[a-zA-Z0-9]([a-zA-Z0-9\-\.]*[a-zA-Z0-9])?$'
        error_message: Must be a valid hostname or IP address.
    display:
      group: database
      index: 4

  database_port:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Port
    description: Port number of the external PostgreSQL server.
    default: "5432"
    only_with:
      postgresql_enabled: "false"
    constraints:
      - pattern: '^\d{1,5}$'
        error_message: Must be a valid port number (1-65535).
    display:
      group: database
      index: 5

  database_ssl_mode:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database SSL Mode
    description: >-
      PostgreSQL SSL connection mode. Use require or verify-full for
      external production databases.
    default: disable
    only_with:
      postgresql_enabled: "false"
    constraints:
      - valid_values:
          - disable
          - require
          - verify-ca
          - verify-full
        error_message: Must be disable, require, verify-ca, or verify-full.
    display:
      group: database
      index: 6

  database_credentials:
    type: secret_key
    hidden: false
    allow_update: false
    required: true
    display_label: Database Credentials
    description: >-
      DAP Basic Authentication secret holding the 'username' and 'password'
      for the Artifactory PostgreSQL user. Replaces the separate
      database_user / database_password secrets.
    only_with:
      postgresql_enabled: "false"
    constraints:
      - type: basic_auth_credentials
        error_message: Secret must be of type Basic Authentication Credentials (username/password).
    display:
      group: database
      index: 7
  # -- Chart Settings ----------------------------------------------
  release_name:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Helm Release Name
    description: Name of the Helm release for the JFrog Platform deployment.
    default: jfrog-platform
    constraints:
      - pattern: '^[a-z0-9][a-z0-9\-]{0,52}$'
        error_message: Must be a valid Helm release name.
    display:
      group: chart_settings
      index: 0

  sizing_template:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Sizing Template
    description: >
      Resource sizing profile for all JFrog Platform components.
      xsmall - 1 replica, 1 CPU / 4 Gi (dev/test, minimum).
      small - 1 replica, 1 CPU / 5 Gi (small teams, up to ~50 users).
      medium - 2 replicas, 1 CPU / 5 Gi each (HA, up to ~500 users).
      large - 3 replicas, 2 CPU / 12 Gi each (large orgs, up to ~2000 users).
      xlarge - 4 replicas, 2 CPU / 16 Gi each (very large orgs, up to ~5000 users).
      2xlarge - 6 replicas, 4 CPU / 24 Gi each (enterprise-scale, 5000+ users).
      IMPORTANT: licensing depends on the tier you pick here. medium, large,
      xlarge and 2xlarge are HA/multi-replica and REQUIRE an Artifactory
      Enterprise license (one per replica): for these tiers you MUST set
      "Create License Secret" to true AND select a "License Secret" in the
      Sizing and Licensing group, otherwise the install aborts during input
      validation. xsmall and small are single-replica and run in trial mode,
      so a license is optional for them.
    default: small
    constraints:
      - valid_values:
          - xsmall
          - small
          - medium
          - large
          - xlarge
          - 2xlarge
        error_message: Must be one of xsmall, small, medium, large, xlarge, 2xlarge.
    display:
      group: licensing
      index: 0

  # -- Licensing ---------------------------------------------------
  create_license_secret:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Create License Secret (must be true for medium and above)
    description: >-
      RULE: this depends on the Sizing Template. For medium, large, xlarge
      and 2xlarge you MUST set this to true - these tiers are multi-replica
      and require an Artifactory Enterprise license (one per replica), and
      the input validator aborts the install if it is false. For xsmall and
      small leave it false to run in trial mode (the license is optional and
      can be applied later via the UI). true = create a Kubernetes Secret
      with the license from the DAP secret below; false = trial mode.
    default: "false"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true (create) or false (skip).
    display:
      group: licensing
      index: 1

  license_secret_ref:
    type: secret_key
    hidden: false
    allow_update: true
    required: false
    display_label: License Secret (required for medium and above)
    description: >-
      DAP general secret containing the raw Artifactory license text.
      RULE: MANDATORY when the Sizing Template is medium and above (medium /
      large / xlarge / 2xlarge) with "Create License Secret" = true - the
      input validator aborts the install if it is empty for those tiers.
      Optional and ignored for xsmall / small (trial mode).
    constraints:
      - type: general
        error_message: Secret must be of type general.
    display:
      group: licensing
      index: 2

  create_master_key_secret:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Create Master Key Secret
    description: >-
      Create a Kubernetes Secret holding the Artifactory master key from
      a DAP general secret. false = chart's auto-generated default master
      key is used (insecure example value, NOT recommended for
      production). true = the K8s Secret 'jfrog-platform-master-key' is
      created with data key 'master-key' from the supplied DAP secret.
      Optional at every sizing tier; provide one for any production /
      HA install since the chart's hardcoded default is documented as
      an example only.
    default: "false"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true (inject DAP secret) or false (use chart default).
    display:
      group: chart_settings
      index: 2

  master_key_secret_ref:
    type: secret_key
    hidden: false
    allow_update: false
    required: false
    only_with:
      create_master_key_secret: "true"
    display_label: Master Key Secret
    description: >-
      DAP general secret containing the raw Artifactory master key.
      Must be EXACTLY 64 hexadecimal characters (matches the chart's
      values.yaml format for global.masterKey, generated via
      'openssl rand -hex 32'). Required when create_master_key_secret
      is true. The input validator fails early if the value is missing,
      the wrong length, or contains non-hex characters. Used as the
      'master-key' field of the Kubernetes Secret referenced by
      artifactory.masterKeySecretName.
    constraints:
      - type: general
        error_message: Secret must be of type general.
    display:
      group: chart_settings
      index: 3

  create_join_key_secret:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Create Join Key Secret
    description: >-
      Create a Kubernetes Secret holding the Artifactory join key from a
      DAP general secret. false = chart's auto-generated default join
      key is used (insecure example value, NOT recommended for
      production). true = the K8s Secret 'jfrog-platform-join-key' is
      created with data key 'join-key' from the supplied DAP secret.
      Optional at every sizing tier; provide one for any production /
      HA install since the chart's hardcoded default is documented as
      an example only.
    default: "false"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true (inject DAP secret) or false (use chart default).
    display:
      group: chart_settings
      index: 4

  join_key_secret_ref:
    type: secret_key
    hidden: false
    allow_update: false
    required: false
    only_with:
      create_join_key_secret: "true"
    display_label: Join Key Secret
    description: >-
      DAP general secret containing the raw Artifactory join key.
      Must be EXACTLY 32 hexadecimal characters (matches the chart's
      values.yaml format for global.joinKey, generated via
      'openssl rand -hex 16'). Required when create_join_key_secret
      is true. The input validator fails early if the value is missing,
      the wrong length, or contains non-hex characters. Used as the
      'join-key' field of the Kubernetes Secret referenced by
      artifactory.joinKeySecretName.
    constraints:
      - type: general
        error_message: Secret must be of type general.
    display:
      group: chart_settings
      index: 5

  # -- Networking --------------------------------------------------
  nginx_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Bundled NGINX (LoadBalancer)
    description: >-
      Enable the chart's bundled NGINX reverse-proxy with a LoadBalancer service.
      Set to true for LoadBalancer mode. Set to false to use Kubernetes Ingress instead.
    default: "true"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true or false.
    display:
      group: networking
      index: 0

  ingress_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Kubernetes Ingress
    description: >-
      Enable a Kubernetes Ingress resource for external access.
      Set to true when Bundled NGINX is false.
    default: "false"
    only_with:
      nginx_enabled: "false"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true or false.
    display:
      group: networking
      index: 1

  ingress_class_name:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Class Name
    description: >-
      Name of an existing Kubernetes IngressClass to bind the Artifactory Ingress to.
      The ingress controller is a cluster prerequisite. Examples: nginx
    default: nginx
    only_with:
      nginx_enabled: "false"
      ingress_enabled: "true"
    constraints:
      - pattern: '^[a-z0-9][a-z0-9\-\.]*$'
        error_message: Must be a valid ingress class name.
    display:
      group: networking
      index: 2

  ingress_host:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Host
    description: >-
      DNS hostname for the Ingress resource (e.g., artifactory.example.com).
    default: "artifactory.example.com"
    only_with:
      nginx_enabled: "false"
      ingress_enabled: "true"
    constraints:
      - pattern: '^$|^[a-z0-9]([a-z0-9\-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9\-]*[a-z0-9])?)+$'
        error_message: Must be empty or a valid DNS hostname (e.g., artifactory.example.com).
    display:
      group: networking
      index: 3

  ingress_tls_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Ingress TLS Enabled
    description: >-
      Serve the Kubernetes Ingress over HTTPS. Requires a pre-existing
      Kubernetes TLS secret (see Ingress TLS Secret Name). Only applies
      when Bundled NGINX is false and Kubernetes Ingress is true.
    default: "false"
    only_with:
      nginx_enabled: "false"
      ingress_enabled: "true"
    constraints:
      - valid_values: ["true", "false"]
        error_message: Must be true or false.
    display:
      group: networking
      index: 4

  ingress_tls_secret_ref:
    type: secret_key
    hidden: false
    allow_update: true
    required: true
    display_label: Ingress TLS Secret
    description: >-
      DAP general secret holding the Ingress TLS material in fields
      'tls.crt' (PEM certificate chain) and 'tls.key' (PEM private key).
      Required when Ingress TLS is enabled. The blueprint creates a
      kubernetes.io/tls Secret named '<release>-tls' from it and terminates
      HTTPS on the Ingress - no need to pre-create a Kubernetes secret.
    only_with:
      nginx_enabled: "false"
      ingress_enabled: "true"
      ingress_tls_enabled: "true"
    constraints:
      - type: general
        error_message: Secret must be of type general with 'tls.crt' and 'tls.key' fields.
    display:
      group: networking
      index: 5

  ingress_annotations:
    type: dict
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Annotations
    description: >-
      Optional annotations applied to artifactory.ingress.annotations, rendered
      to a Helm values file (so values keep their exact YAML form, including
      numbers, booleans, and multi-line blocks). Leave empty to apply no custom
      annotations. NOTE: nginx.org/redirect-to-https is managed by the blueprint
      based on Ingress TLS (set to "false" when TLS is off, omitted when on) -
      do not set it here.
    default: {}
    only_with:
      nginx_enabled: "false"
      ingress_enabled: "true"
    display:
      group: networking
      index: 6
