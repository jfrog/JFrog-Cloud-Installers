---

input_groups:
  credentials:
    display_label: Credentials
    collapsible: true
    index: 0
    inputs:
      - k8s_credentials
      - target_deployment_id
  chart_settings:
    display_label: Chart Settings
    collapsible: true
    index: 1
    inputs:
      - ingress_nginx_version
      - ingress_nginx_repo_url

inputs:

  k8s_credentials:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Cluster Access Secret
    description: |
      Secret name containing details needed for Kubernetes cluster.
      Required keys: host, port, verify_ssl, ssl_ca_cert.
      For verify_ssl='TLS': also requires cert_file, key_file.
      For verify_ssl='Token': also requires token.
    display:
      group: k8s_target_cluster
      index: 0

  target_deployment_id:
    type: deployment_id
    hidden: false
    allow_update: false
    required: true
    display_label: Target Infrastructure ID
    description: Deployment ID of the target Kubernetes infrastructure (used for SaaS DAPO label linking).
    display:
      group: k8s_target_cluster
      index: 1

  ingress_nginx_version:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Ingress NGINX Chart Version
    description: ingress-nginx Helm chart version to install.
    default: 4.12.1
    display:
      group: chart_settings
      index: 0

  ingress_nginx_repo_url:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Ingress NGINX Helm Repository
    description: Helm repository URL for ingress-nginx.
    default: https://kubernetes.github.io/ingress-nginx
    display:
      group: chart_settings
      index: 1
