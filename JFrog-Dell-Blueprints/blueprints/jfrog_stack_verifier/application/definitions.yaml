---

node_templates:

  fetch_labels:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        start:
          implementation: application/scripts/fetch_labels.py
          executor: central_deployment_agent
          inputs:
            target_deployment_id: { get_input: target_deployment_id }
        stop:
          implementation: application/scripts/fetch_labels_stop.py
          executor: central_deployment_agent

  fetch_k8s_config_secret:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: application/scripts/parse_k8s_secret.py
          executor: central_deployment_agent
          inputs:
            k8s_credentials: { get_input: k8s_credentials }
    relationships:
      - type: dell.relationships.depends_on
        target: fetch_labels

  stack_verifier_namespace:
    type: dell.nodes.kubernetes.resources.Namespace
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      create_if_missing: true
      use_external_resource: false
      definition:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: { get_input: namespace }
      options:
        namespace: { get_input: namespace }
    relationships:
      - type: dell.relationships.depends_on
        target: fetch_k8s_config_secret

  stack_verifier_pull_secret:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      create_if_missing: true
      definition:
        apiVersion: v1
        kind: Secret
        type: kubernetes.io/dockerconfigjson
        metadata:
          name: { get_input: pull_secret_name }
          namespace: { get_input: namespace }
        data:
          .dockerconfigjson: { get_attribute: [SELF, registry_secret_data] }
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: create_pull_secret }
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: application/scripts/prepare_registry_data.py
          executor: central_deployment_agent
          inputs:
            container_registry_name: { get_input: container_registry_name }
            container_registry_username:
              get_secret: [{ get_input: container_registry_credentials_secret }, username]
            container_registry_password:
              get_secret: [{ get_input: container_registry_credentials_secret }, password]
    relationships:
      - type: dell.relationships.depends_on
        target: stack_verifier_namespace

  stack_verifier_service_account:
    type: dell.nodes.kubernetes.resources.ServiceAccount
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: { get_input: service_account_name }
          namespace: { get_input: namespace }
      options:
        namespace: { get_input: namespace }
    relationships:
      - type: dell.relationships.depends_on
        target: stack_verifier_namespace

  stack_verifier_cluster_role:
    type: dell.nodes.kubernetes.resources.ClusterRole
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: { get_input: cluster_role_name }
        # Least-privilege: the verifier Job only reads cluster-scoped
        # resources. 'kubectl version' uses the unauthenticated discovery
        # endpoint and needs no rule. No write/secret access is granted.
        rules:
          - apiGroups: [""]
            resources: ["nodes"]
            verbs: ["get", "list"]
          - apiGroups: ["storage.k8s.io"]
            resources: ["storageclasses"]
            verbs: ["get", "list"]
          - apiGroups: ["networking.k8s.io"]
            resources: ["ingressclasses"]
            verbs: ["get", "list"]
    relationships:
      - type: dell.relationships.depends_on
        target: stack_verifier_service_account

  stack_verifier_role_binding:
    type: dell.nodes.kubernetes.resources.RoleBinding
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: { get_input: cluster_role_binding_name }
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: { get_input: cluster_role_name }
        subjects:
          - kind: ServiceAccount
            name: { get_input: service_account_name }
            namespace: { get_input: namespace }
    relationships:
      - type: dell.relationships.depends_on
        target: stack_verifier_service_account
      - type: dell.relationships.depends_on
        target: stack_verifier_cluster_role

  stack_verifier_job_name:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          executor: central_deployment_agent
          inputs:
            create_pull_secret: { get_input: create_pull_secret }
            pull_secret_name: { get_input: pull_secret_name }
            min_ready_nodes: { get_input: min_ready_nodes }
            db_connectivity_timeout_seconds: { get_input: db_connectivity_timeout_seconds }
          implementation: application/scripts/prepare_job_spec.py

  stack_verification_job:
    type: dell.nodes.kubernetes.resources.Job
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      validate_resource_status: true
      definition:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: { get_attribute: [stack_verifier_job_name, job_name] }
          namespace: { get_input: namespace }
        spec:
          backoffLimit: 1
          template:
            spec:
              restartPolicy: Never
              serviceAccountName: { get_input: service_account_name }
              imagePullSecrets: { get_attribute: [stack_verifier_job_name, image_pull_secrets] }
              containers:
                - name: verification
                  image:
                    concat:
                      - { get_input: container_registry_name }
                      - "/"
                      - { get_input: blueprint_job_image }
                  command: ["/bin/bash", "-c"]
                  resources:
                    requests:
                      cpu: "100m"
                      memory: "128Mi"
                    limits:
                      cpu: "500m"
                      memory: "512Mi"
                  env:
                    - name: K8S_MIN_VERSION
                      value: { get_input: k8s_min_version }
                    - name: MIN_READY_NODES
                      value: { get_attribute: [stack_verifier_job_name, min_ready_nodes_str] }
                    - name: STORAGE_CLASS
                      value: { get_input: storage_class }
                    - name: INGRESS_ENABLED
                      value: { get_input: ingress_enabled }
                    - name: INGRESS_CLASS_NAME
                      value: { get_input: ingress_class_name }
                    - name: POSTGRESQL_ENABLED
                      value: { get_input: postgresql_enabled }
                    - name: DATABASE_HOST
                      value: { get_input: database_host }
                    - name: DATABASE_PORT
                      value: { get_input: database_port }
                    - name: DB_CONNECT_TIMEOUT
                      value: { get_attribute: [stack_verifier_job_name, db_connect_timeout_str] }
                  args:
                    - |
                      #!/bin/bash
                      set -euo pipefail

                      echo "=== JFrog Platform Stack Verifier ==="

                      # Step 1: Kubernetes version
                      KUBERNETES_VERSION=$(kubectl version 2>/dev/null \
                        | awk '/Server Version/ {print $3}' \
                        | head -n1 || true)
                      if [ -z "$KUBERNETES_VERSION" ]; then
                        echo "ERROR: Failed to retrieve Kubernetes version."
                        exit 1
                      fi
                      LOWEST=$(printf '%s\n%s\n' "$K8S_MIN_VERSION" "$KUBERNETES_VERSION" | sort -V | head -n1)
                      if [ "$LOWEST" != "$K8S_MIN_VERSION" ]; then
                        echo "ERROR: Kubernetes version $KUBERNETES_VERSION below required $K8S_MIN_VERSION."
                        exit 1
                      fi
                      echo "SUCCESS: Kubernetes $KUBERNETES_VERSION meets minimum $K8S_MIN_VERSION"

                      # Step 2: Node readiness
                      READY_NODES=$(kubectl get nodes --no-headers 2>/dev/null \
                        | awk '$2=="Ready" {c++} END {print c+0}')
                      if [ "$READY_NODES" -lt "$MIN_READY_NODES" ]; then
                        echo "ERROR: Only $READY_NODES Ready nodes, require >= $MIN_READY_NODES"
                        exit 1
                      fi
                      echo "SUCCESS: $READY_NODES Ready node(s) (>= $MIN_READY_NODES)"

                      # Step 3: Storage class
                      if [ -n "$STORAGE_CLASS" ]; then
                        AVAILABLE=$(kubectl get storageclass -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")
                        if ! echo " $AVAILABLE " | grep -q " $STORAGE_CLASS "; then
                          echo "ERROR: StorageClass '$STORAGE_CLASS' not found. Available: $AVAILABLE"
                          exit 1
                        fi
                        echo "SUCCESS: StorageClass '$STORAGE_CLASS' exists"
                      else
                        echo "INFO: No storage_class set; assuming cluster default"
                      fi

                      # Step 4: Ingress class (the ingress controller is a
                      # cluster prerequisite, so its IngressClass must already
                      # exist when ingress is in use).
                      if [ "$INGRESS_ENABLED" = "true" ]; then
                        if [ -n "$INGRESS_CLASS_NAME" ]; then
                          AVAILABLE_INGRESS=$(kubectl get ingressclass -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || echo "")
                          if ! echo " $AVAILABLE_INGRESS " | grep -q " $INGRESS_CLASS_NAME "; then
                            echo "ERROR: IngressClass '$INGRESS_CLASS_NAME' not found (install an ingress controller first). Available: $AVAILABLE_INGRESS"
                            exit 1
                          fi
                          echo "SUCCESS: IngressClass '$INGRESS_CLASS_NAME' exists"
                        fi
                      else
                        echo "INFO: Skipping IngressClass check (ingress_enabled=$INGRESS_ENABLED)"
                      fi

                      # Step 5: External database connectivity
                      if [ "$POSTGRESQL_ENABLED" = "false" ]; then
                        echo "Testing connectivity to $DATABASE_HOST:$DATABASE_PORT..."
                        # Pass host/port as positional args ($0/$1) to a
                        # single-quoted inner script so they are only ever
                        # used as the /dev/tcp redirection target and never
                        # interpolated into the command string. This prevents
                        # shell command injection even if the values contain
                        # metacharacters (e.g. $(...), backticks, ';').
                        if ! timeout "$DB_CONNECT_TIMEOUT" bash -c 'exec 3<>"/dev/tcp/$0/$1"' "$DATABASE_HOST" "$DATABASE_PORT" 2>/dev/null; then
                          echo "ERROR: Cannot reach $DATABASE_HOST:$DATABASE_PORT"
                          exit 1
                        fi
                        echo "SUCCESS: $DATABASE_HOST:$DATABASE_PORT reachable"
                      else
                        echo "INFO: Skipping external DB check (postgresql_enabled=$POSTGRESQL_ENABLED)"
                      fi

                      echo "=== All stack verification checks passed ==="
    relationships:
      - type: dell.relationships.depends_on
        target: stack_verifier_pull_secret
      - type: dell.relationships.depends_on
        target: stack_verifier_role_binding
      - type: dell.relationships.depends_on
        target: stack_verifier_job_name

capabilities:
  stack_verifier_status:
    description: Stack verification job completion status
    value: { get_attribute: [stack_verification_job, kubernetes, status, conditions, 0, type] }
