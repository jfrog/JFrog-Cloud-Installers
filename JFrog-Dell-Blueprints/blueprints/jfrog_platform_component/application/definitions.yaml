---

dsl_definitions:
  jfrog_repo_config: &jfrog_repo_config
    name: jfrog
    repo_url: { get_input: jfrog_helm_repo_url }

node_templates:

  fetch_labels:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        start:
          implementation: application/scripts/fetch_labels.py
          executor: central_deployment_agent
          inputs:
            target_deployment_id: { get_input: target_deployment_id }
        stop:
          implementation: application/scripts/fetch_labels_stop.py
          executor: central_deployment_agent

  fetch_k8s_config_secret:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: application/scripts/parse_k8s_secret.py
          executor: central_deployment_agent
          inputs:
            k8s_credentials: { get_input: k8s_credentials }

  create_namespace:
    type: dell.nodes.kubernetes.resources.Namespace
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      create_if_missing: true
      use_external_resource: false
      definition:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: { get_input: namespace }
    relationships:
      - target: fetch_labels
        type: dell.relationships.depends_on
      - target: fetch_k8s_config_secret
        type: dell.relationships.depends_on

  license_secret:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: { get_input: license_secret_name }
          namespace: { get_input: namespace }
        type: Opaque
        stringData:
          artifactory.lic:
            get_secret: { get_input: license_secret_ref }
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: apply_license_secret }
    relationships:
      - target: create_namespace
        type: dell.relationships.depends_on

  master_key_secret:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: { get_input: master_key_secret_name }
          namespace: { get_input: namespace }
        type: Opaque
        stringData:
          master-key:
            get_secret: { get_input: master_key_secret_ref }
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: apply_master_key_secret }
    relationships:
      - target: create_namespace
        type: dell.relationships.depends_on

  join_key_secret:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: { get_input: join_key_secret_name }
          namespace: { get_input: namespace }
        type: Opaque
        stringData:
          join-key:
            get_secret: { get_input: join_key_secret_ref }
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: apply_join_key_secret }
    relationships:
      - target: create_namespace
        type: dell.relationships.depends_on

  compute_key_secret_names:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          executor: central_deployment_agent
          inputs:
            apply_master_key_secret: { get_input: apply_master_key_secret }
            master_key_secret_name: { get_input: master_key_secret_name }
            apply_join_key_secret: { get_input: apply_join_key_secret }
            join_key_secret_name: { get_input: join_key_secret_name }
          implementation: application/scripts/compute_key_secret_names.py

  compute_ingress_tls:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          executor: central_deployment_agent
          inputs:
            ingress_tls_enabled: { get_input: ingress_tls_enabled }
            ingress_enabled: { get_input: ingress_enabled }
            release_name: { get_input: release_name }
            ingress_host: { get_input: ingress_host }
          implementation: application/scripts/compute_ingress_tls.py

  # Create the kubernetes.io/tls Secret from the supplied DAP secret
  # (tls.crt / tls.key). Only created when TLS is enabled; the chart's
  # artifactory.ingress.tls[0].secretName points at this Secret.
  ingress_tls_secret:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: { get_attribute: [compute_ingress_tls, tls_secret_name_effective] }
          namespace: { get_input: namespace }
        type: kubernetes.io/tls
        stringData:
          tls.crt:
            get_secret: [{ get_input: ingress_tls_secret_ref }, tls.crt]
          tls.key:
            get_secret: [{ get_input: ingress_tls_secret_ref }, tls.key]
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: create_ingress_tls_secret }
    relationships:
      - target: create_namespace
        type: dell.relationships.depends_on
      - target: compute_ingress_tls
        type: dell.relationships.depends_on

  database_credentials_bundled:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: { get_input: database_secret_name }
          namespace: { get_input: namespace }
        type: Opaque
        stringData:
          db-admin-password: postgres
          db-user: artifactory
          db-password: artifactory
          db-url:
            concat:
              - "jdbc:postgresql://"
              - { get_input: database_host }
              - ":"
              - { get_input: database_port }
              - "/artifactory?sslmode="
              - { get_input: database_ssl_mode }
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: apply_bundled_db_secret }
    relationships:
      - target: create_namespace
        type: dell.relationships.depends_on

  database_credentials_external:
    type: dell.nodes.kubernetes.resources.Secret
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      definition:
        apiVersion: v1
        kind: Secret
        metadata:
          name: { get_input: database_secret_name }
          namespace: { get_input: namespace }
        type: Opaque
        stringData:
          db-admin-password:
            get_secret: { get_input: database_admin_password }
          db-user:
            get_secret: [{ get_input: database_credentials }, username]
          db-password:
            get_secret: [{ get_input: database_credentials }, password]
          db-url:
            concat:
              - "jdbc:postgresql://"
              - { get_input: database_host }
              - ":"
              - { get_input: database_port }
              - "/artifactory?sslmode="
              - { get_input: database_ssl_mode }
      options:
        namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: apply_external_db_secret }
    relationships:
      - target: create_namespace
        type: dell.relationships.depends_on

  helm_binary:
    type: dell.nodes.helm.Binary

  jfrog_repo:
    type: dell.nodes.helm.Repo
    properties:
      resource_config: *jfrog_repo_config
    relationships:
      - target: helm_binary
        type: dell.relationships.helm.run_on_host

  jfrog_platform_release:
    type: dell.nodes.helm.Release
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      rollback: false
      resource_config:
        name: { get_input: release_name }
        chart: jfrog/jfrog-platform
        values_file:
          concat:
            - "sizing/platform-"
            - { get_input: sizing_template }
            - ".yaml"
        set_values:
          - name: artifactory.enabled
            value: "true"
          - name: artifactory.artifactory.persistence.enabled
            value: "true"
          - name: artifactory.artifactory.persistence.type
            value: { get_input: persistence_type }
          - name: artifactory.artifactory.persistence.storageClassName
            value: { get_input: storage_class }
          - name: artifactory.artifactory.persistence.size
            value: { get_input: pvc_size }
          - name: artifactory.artifactory.persistence.accessMode
            value: { get_input: pvc_access_mode }
          - name: artifactory.artifactory.persistence.nfs.ip
            value: { get_input: nfs_ip }
          - name: artifactory.artifactory.persistence.nfs.capacity
            value: { get_input: nfs_capacity }
          - name: artifactory.artifactory.persistence.fileSystem.cache.enabled
            value: { get_input: filesystem_cache_enabled }
          - name: artifactory.nginx.enabled
            value: { get_input: nginx_enabled }
          - name: artifactory.ingress.enabled
            value: { get_input: ingress_enabled }
          - name: artifactory.ingress.className
            value: { get_input: ingress_class_name }
          - name: artifactory.ingress.hosts[0]
            value: { get_input: ingress_host }
          - name: rabbitmq.enabled
            value: "false"
          - name: postgresql.enabled
            value: { get_input: postgresql_enabled }
          - name: global.database.initDBCreation
            value: { get_input: postgresql_enabled }
          - name: global.database.host
            value: { get_input: database_host }
          - name: global.database.port
            value: { get_input: database_port }
          - name: global.database.sslMode
            value: { get_input: database_ssl_mode }
          - name: global.database.secrets.adminPassword.name
            value: { get_input: database_secret_name }
          - name: global.database.secrets.adminPassword.key
            value: db-admin-password
          - name: artifactory.database.type
            value: "postgresql"
          - name: artifactory.database.driver
            value: "org.postgresql.Driver"
          - name: artifactory.database.secrets.user.name
            value: { get_input: database_secret_name }
          - name: artifactory.database.secrets.user.key
            value: db-user
          - name: artifactory.database.secrets.password.name
            value: { get_input: database_secret_name }
          - name: artifactory.database.secrets.password.key
            value: db-password
          - name: artifactory.database.secrets.url.name
            value: { get_input: database_secret_name }
          - name: artifactory.database.secrets.url.key
            value: db-url
          - name: xray.enabled
            value: "false"
          - name: distribution.enabled
            value: "false"
          - name: artifactory.artifactory.license.secret
            value: { get_input: license_secret_name }
          - name: artifactory.artifactory.license.dataKey
            value: artifactory.lic
          - name: artifactory.artifactory.masterKeySecretName
            value: { get_attribute: [compute_key_secret_names, master_key_secret_name] }
          - name: artifactory.artifactory.joinKeySecretName
            value: { get_attribute: [compute_key_secret_names, join_key_secret_name] }
        flags:
          # NOTE: do not add 'create-namespace' here. The helm plugin
          # reuses these flags for 'helm uninstall', which rejects
          # --create-namespace ("unknown flag"). The namespace is
          # created by the dedicated create_namespace node instead.
          - name: namespace
            value: { get_input: namespace }
          - name: version
            value: { get_input: chart_version }
          - name: wait
          - name: timeout
            value: "10m0s"
    interfaces:
      dell.interfaces.lifecycle:
        # Render the deployer-supplied ingress annotations to a values file
        # before install and before upgrade (re-rendered so updates pick up
        # changes), then load it via a `--values` flag scoped to install/upgrade
        # only (NOT delete/uninstall, which would reject --values).
        precreate:
          executor: central_deployment_agent
          implementation: application/scripts/render_ingress_values.py
          inputs:
            ingress_annotations: { get_input: ingress_annotations }
            ingress_tls_enabled: { get_input: ingress_tls_enabled }
            ingress_host: { get_input: ingress_host }
            namespace: { get_input: namespace }
            release_name: { get_input: release_name }
        preupdate:
          executor: central_deployment_agent
          implementation: application/scripts/render_ingress_values.py
          inputs:
            ingress_annotations: { get_input: ingress_annotations }
            ingress_tls_enabled: { get_input: ingress_tls_enabled }
            ingress_host: { get_input: ingress_host }
            namespace: { get_input: namespace }
            release_name: { get_input: release_name }
        start:
          inputs:
            flags:
              - name: values
                value: { get_attribute: [jfrog_platform_release, values_file_path] }
        update:
          inputs:
            flags:
              - name: values
                value: { get_attribute: [jfrog_platform_release, values_file_path] }
    relationships:
      - target: helm_binary
        type: dell.relationships.helm.run_on_host
      - target: jfrog_repo
        type: dell.relationships.depends_on
      - target: create_namespace
        type: dell.relationships.depends_on
      - target: license_secret
        type: dell.relationships.depends_on
      - target: compute_key_secret_names
        type: dell.relationships.depends_on
      - target: master_key_secret
        type: dell.relationships.depends_on
      - target: join_key_secret
        type: dell.relationships.depends_on
      - target: database_credentials_bundled
        type: dell.relationships.depends_on
      - target: database_credentials_external
        type: dell.relationships.depends_on
      - target: compute_ingress_tls
        type: dell.relationships.depends_on
      - target: ingress_tls_secret
        type: dell.relationships.depends_on

  # Service endpoint discovery: read the bundled NGINX LoadBalancer Service
  # to expose its real external IP:port. Gated to NGINX/LoadBalancer mode via
  # scalable.default_instances (0 in ingress mode so we never read a Service
  # that does not exist).
  # NOTE: the Service name suffix '-artifactory-nginx' is specific to the
  # jfrog/jfrog-platform chart's bundled NGINX subchart. If the chart ever
  # changes this naming convention, update the concat below accordingly. This
  # coupling only applies to LoadBalancer mode; in Ingress mode the node is
  # gated off and the access URL comes from compute_ingress_tls instead.
  check_nginx_service_endpoint:
    type: dell.nodes.kubernetes.resources.CustomObject
    properties:
      client_config: { get_attribute: [fetch_k8s_config_secret, k8s_client_config] }
      use_external_resource: true
      options:
        namespace: { get_input: namespace }
        group: core
        plural: services
        version: v1
      definition:
        apiVersion: v1
        kind: Service
        metadata:
          name:
            concat:
              - { get_input: release_name }
              - "-artifactory-nginx"
          namespace: { get_input: namespace }
    capabilities:
      scalable:
        properties:
          default_instances: { get_input: discover_lb_endpoint }
    relationships:
      - target: fetch_k8s_config_secret
        type: dell.relationships.depends_on
      - target: jfrog_platform_release
        type: dell.relationships.depends_on

  # Always runs (default 1 instance) and turns the LoadBalancer IP into a clean
  # string so the platform_url_loadbalancer capability never renders the raw
  # unresolved get_attribute JSON in ingress mode. Reads the IP from
  # check_nginx_service_endpoint, which only exists in LoadBalancer mode; the
  # script treats a missing/unresolved value as "no LoadBalancer" (empty URL).
  resolve_lb_endpoint:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        start:
          executor: central_deployment_agent
          implementation: application/scripts/resolve_lb_endpoint.py
          inputs:
            lb_ip: { get_attribute: [check_nginx_service_endpoint, kubernetes, status, load_balancer, ingress, 0, ip] }
    relationships:
      - target: jfrog_platform_release
        type: dell.relationships.depends_on
      - target: check_nginx_service_endpoint
        type: dell.relationships.depends_on

capabilities:
  release_name:
    description: Name of the deployed Helm release
    value: { get_input: release_name }
  namespace:
    description: Kubernetes namespace of the deployment
    value: { get_input: namespace }
  sizing:
    description: Applied sizing template
    value: { get_input: sizing_template }
  platform_url_ingress:
    description: >-
      Artifactory URL when using Kubernetes Ingress mode. Populated only when
      ingress_enabled is true; empty in bundled NGINX (LoadBalancer) mode.
    value: { get_attribute: [compute_ingress_tls, platform_url_ingress] }
  platform_url_loadbalancer:
    description: >-
      Artifactory URL when using bundled NGINX (LoadBalancer) mode. Resolved
      from the external IP of the <release_name>-artifactory-nginx Service.
      Empty in ingress mode.
    value: { get_attribute: [resolve_lb_endpoint, platform_url_loadbalancer] }
