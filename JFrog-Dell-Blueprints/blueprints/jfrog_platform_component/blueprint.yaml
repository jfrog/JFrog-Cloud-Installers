---

tosca_definitions_version: dell_1_1

description: >
  JFrog Platform Component Blueprint. Deploys the JFrog Platform
  (Artifactory) using the official jfrog/jfrog-platform Helm chart.
  Includes fetch_labels for SaaS DAPO infrastructure linkage,
  namespace + secret creation, and the JFrog Platform Helm release
  with rollback disabled for easier debugging.

imports:
  - dell/types/types.yaml
  - plugin:helm-plugin?version= >=1.4.0.0,<2.0.0.0
  - plugin:kubernetes-plugin?version= >=3.3.0.0,<4.0.0.0
  - inputs/inputs.yaml
  - inputs/inputs_hidden.yaml
  - application/definitions.yaml

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ece
  solution:
    values:
      - jfrog_platform_component
  version:
    values:
      - "1.0"

blueprint_labels:
  env:
    values:
      - Dell
  obj-type:
    values:
      - helm
  csys-obj-type:
    values:
      - environment
