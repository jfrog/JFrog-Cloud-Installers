---

# This file holds inputs that are NOT user-visible.  Only fixed
# build-time values or DAP-internal mappings belong here per Dell
# review item #13.
#
# The chart_version value below is overwritten by the build pipeline
# (see Makefile) with the resolved chart version.  All other settings
# stay constant across deployments and live in inputs.yaml.

inputs:

  chart_version:
    type: string
    hidden: true
    allow_update: true
    required: true
    display_label: Chart Version
    description: >-
      jfrog/jfrog-platform Helm chart version. Injected automatically
      by the build pipeline; forwarded from the orchestrator and never
      customer-editable on this child blueprint.
    default: 0.0.0

  license_secret_name:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: License Kubernetes Secret Name
    description: Name of the Kubernetes Secret created with the Artifactory license.
    default: jfrog-platform-license

  database_secret_name:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Database Credentials Kubernetes Secret Name
    description: Name of the Kubernetes Secret created with database credentials.
    default: jfrog-platform-database-creds

  master_key_secret_name:
    type: string
    hidden: true
    allow_update: false
    required: false
    display_label: Master Key Kubernetes Secret Name
    description: >-
      Name of the Kubernetes Secret created with the Artifactory master
      key (data field 'master-key').  The compute_key_secret_names node
      resolves masterKeySecretName to this value only when
      apply_master_key_secret == 1; otherwise it is passed to the chart
      empty so the chart helper falls back to its auto-generated
      <release>-artifactory secret.
    default: jfrog-platform-master-key

  join_key_secret_name:
    type: string
    hidden: true
    allow_update: false
    required: false
    display_label: Join Key Kubernetes Secret Name
    description: >-
      Name of the Kubernetes Secret created with the Artifactory join
      key (data field 'join-key').  The compute_key_secret_names node
      resolves joinKeySecretName to this value only when
      apply_join_key_secret == 1; otherwise it is passed to the chart
      empty so the chart helper falls back to its auto-generated
      <release>-artifactory secret.
    default: jfrog-platform-join-key

  # Conditional-resource gates (0/1) resolved by the orchestrator from its
  # user-facing true/false toggles and fed to scalable.default_instances.
  # Never customer-editable on this child blueprint.
  apply_bundled_db_secret:
    type: integer
    hidden: true
    allow_update: false
    required: true
    display_label: Apply Bundled Database Secret
    description: >-
      Gate (0/1) for the bundled-PostgreSQL credentials Secret node.
      Resolved by the orchestrator from its true/false toggle.
    default: 0
  apply_external_db_secret:
    type: integer
    hidden: true
    allow_update: false
    required: true
    display_label: Apply External Database Secret
    description: >-
      Gate (0/1) for the external-database credentials Secret node.
      Resolved by the orchestrator from its true/false toggle.
    default: 0
  apply_license_secret:
    type: integer
    hidden: true
    allow_update: false
    required: true
    display_label: Apply License Secret
    description: >-
      Gate (0/1) for the license Secret node. Resolved by the orchestrator
      from the true/false Apply License Secret toggle; 1 = create K8s
      secret from DAP general secret, 0 = trial mode.
    default: 0
  apply_master_key_secret:
    type: integer
    hidden: true
    allow_update: false
    required: true
    display_label: Apply Master Key Secret
    description: >-
      Gate (0/1) for the master-key Secret node. Resolved by the
      orchestrator from its true/false toggle. 1 = inject DAP general
      secret as master-key, 0 = use chart default.
    default: 0
  apply_join_key_secret:
    type: integer
    hidden: true
    allow_update: false
    required: true
    display_label: Apply Join Key Secret
    description: >-
      Gate (0/1) for the join-key Secret node. Resolved by the
      orchestrator from its true/false toggle. 1 = inject DAP general
      secret as join-key, 0 = use chart default.
    default: 0
  discover_lb_endpoint:
    type: integer
    hidden: true
    allow_update: false
    required: false
    display_label: Discover LoadBalancer Endpoint
    description: >-
      Gate (0/1) for the NGINX LoadBalancer service-discovery node.
      Resolved by the orchestrator from nginx_enabled; 1 in bundled-NGINX
      LoadBalancer mode, 0 in ingress mode.
    default: 1

  create_ingress_tls_secret:
    type: integer
    hidden: true
    allow_update: true
    required: false
    display_label: Create TLS Secret
    description: >-
      Gate (0/1) for the Ingress kubernetes.io/tls Secret node. Resolved by
      the orchestrator from its ingress_tls_enabled true/false toggle.
    default: 0

  jfrog_helm_repo_url:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: JFrog Helm Repository
    description: Helm repository URL for the JFrog Platform chart.
    default: https://charts.jfrog.io
