---

input_groups:
  credentials:
    display_label: Credentials
    collapsible: true
    index: 0
    inputs:
      - k8s_credentials
      - target_deployment_id
  infrastructure:
    display_label: Infrastructure
    collapsible: true
    index: 1
    inputs:
      - namespace
  persistence:
    display_label: Persistence
    collapsible: true
    index: 2
    inputs:
      - persistence
      - persistence_type
      - filesystem_cache_enabled
      - storage_class
      - pvc_access_mode
      - pvc_size
      - nfs_ip
      - nfs_capacity
  database:
    display_label: Database Configuration
    collapsible: true
    index: 3
    inputs:
      - postgresql_enabled
      - database_admin_password
      - database_host
      - database_port
      - database_ssl_mode
      - database_credentials
  chart_settings:
    display_label: Chart Settings
    collapsible: true
    index: 4
    inputs:
      - release_name
      - master_key_secret_ref
      - join_key_secret_ref
  licensing:
    display_label: Sizing and Licensing
    collapsible: true
    index: 5
    inputs:
      - sizing_template
      - license_secret_ref
  networking:
    display_label: Ingress
    collapsible: true
    index: 6
    inputs:
      - nginx_enabled
      - ingress_enabled
      - ingress_class_name
      - ingress_host
      - ingress_tls_enabled
      - ingress_tls_secret_ref
      - ingress_annotations

inputs:

  k8s_credentials:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Cluster Access Secret
    description: |
      Secret name containing details needed for Kubernetes cluster.
      Required keys: host, port, verify_ssl, ssl_ca_cert.
      For verify_ssl='TLS': also requires cert_file, key_file.
      For verify_ssl='Token': also requires token.
    display:
      group: k8s_target_cluster
      index: 0

  target_deployment_id:
    type: deployment_id
    hidden: false
    allow_update: false
    required: true
    display_label: Target Infrastructure ID
    description: Deployment ID of the target Kubernetes infrastructure (used for SaaS DAPO label linking).
    display:
      group: k8s_target_cluster
      index: 1

  namespace:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Kubernetes Namespace
    description: Target namespace (created if it does not exist).
    default: jfrog-platform
    display:
      group: infrastructure
      index: 0

  persistence:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Persistence
    description: Persistence mode (storage-type or storage-class).
    default: storage-class
    display:
      group: persistence
      index: 0

  persistence_type:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Persistence Type
    description: Persistence type when persistence=storage-type.
    default: file-system
    display:
      group: persistence
      index: 1

  filesystem_cache_enabled:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: File-System Cache Enabled
    description: Enable Artifactory's local file-system cache layer.
    default: "false"
    display:
      group: persistence
      index: 2

  storage_class:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Storage Class
    description: Kubernetes StorageClass name. Empty = use cluster default.
    default: ""
    display:
      group: persistence
      index: 3

  pvc_access_mode:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: PVC Access Mode
    description: Access mode for the PersistentVolumeClaim.
    default: ReadWriteOnce
    display:
      group: persistence
      index: 4

  pvc_size:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: PVC Size
    description: Storage default size.  Increase for production.
    default: "20Gi"
    display:
      group: persistence
      index: 5

  nfs_ip:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: NFS Server IP
    description: IP address of the NFS server.
    default: ""
    display:
      group: persistence
      index: 6

  nfs_capacity:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: NFS Capacity
    description: Storage capacity for NFS mount.
    default: "200Gi"
    display:
      group: persistence
      index: 7

  postgresql_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Bundled PostgreSQL
    description: When true, the bundled PostgreSQL subchart is deployed.
    default: "false"
    display:
      group: database
      index: 0

  database_admin_password:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Admin Password
    description: DAP general secret with the PostgreSQL admin password.
    display:
      group: database
      index: 3

  database_host:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Host
    description: Hostname of the PostgreSQL server.
    default: jfrog-platform-postgresql
    display:
      group: database
      index: 4

  database_port:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Port
    description: Port number of the external PostgreSQL server.
    default: "5432"
    display:
      group: database
      index: 5

  database_ssl_mode:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database SSL Mode
    description: PostgreSQL SSL connection mode.
    default: disable
    display:
      group: database
      index: 6

  database_credentials:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Credentials
    description: >-
      DAP Basic Authentication secret name holding the 'username' and
      'password' for the Artifactory PostgreSQL user.
    display:
      group: database
      index: 7
  release_name:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Helm Release Name
    description: Name of the Helm release.
    default: jfrog-platform
    display:
      group: chart_settings
      index: 0

  sizing_template:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Sizing Template
    description: >
      Resource sizing profile for all JFrog Platform components.
      xsmall - 1 replica, 1 CPU / 4 Gi (dev/test, minimum).
      small - 1 replica, 1 CPU / 5 Gi (small teams, up to ~50 users).
      medium - 2 replicas, 1 CPU / 5 Gi each (HA, up to ~500 users).
      large - 3 replicas, 2 CPU / 12 Gi each (large orgs, up to ~2000 users).
      xlarge - 4 replicas, 2 CPU / 16 Gi each (very large orgs, up to ~5000 users).
      2xlarge - 6 replicas, 4 CPU / 24 Gi each (enterprise-scale, 5000+ users).
      IMPORTANT: medium / large / xlarge / 2xlarge require an Artifactory
      Enterprise license (one per replica). xsmall and small can run in
      trial mode (license optional).
    default: small
    display:
      group: licensing
      index: 0

  license_secret_ref:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: License Secret
    description: DAP general secret with raw Artifactory license text.
    display:
      group: licensing
      index: 1

  master_key_secret_ref:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Master Key Secret
    description: >-
      DAP general secret with the raw Artifactory master key (exactly
      64 hex chars; openssl rand -hex 32).
    display:
      group: chart_settings
      index: 3

  join_key_secret_ref:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Join Key Secret
    description: >-
      DAP general secret with the raw Artifactory join key (exactly
      32 hex chars; openssl rand -hex 16).
    display:
      group: chart_settings
      index: 5

  nginx_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Bundled NGINX (LoadBalancer)
    description: Enable the chart's bundled NGINX reverse-proxy with a LoadBalancer service.
    default: "true"
    display:
      group: networking
      index: 0

  ingress_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Kubernetes Ingress
    description: Enable a Kubernetes Ingress resource for external access.
    default: "false"
    display:
      group: networking
      index: 1

  ingress_class_name:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Class Name
    description: Name of an existing Kubernetes IngressClass.
    default: nginx
    display:
      group: networking
      index: 2

  ingress_host:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Host
    description: DNS hostname for the Ingress resource.
    default: "artifactory.example.com"
    display:
      group: networking
      index: 3

  ingress_tls_enabled:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress TLS Enabled
    description: Serve the Ingress over HTTPS using a TLS secret.
    default: "false"
    display:
      group: networking
      index: 4

  ingress_tls_secret_ref:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress TLS Secret
    description: >-
      DAP general secret holding the Ingress TLS material in fields
      'tls.crt' (PEM certificate chain) and 'tls.key' (PEM private key).
      When TLS is enabled the blueprint creates a kubernetes.io/tls Secret
      named '<release>-tls' from it and attaches it to the Artifactory
      Ingress. Ignored when TLS is disabled.
    display:
      group: networking
      index: 5

  ingress_annotations:
    type: dict
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Annotations
    description: >-
      Optional annotations applied to artifactory.ingress.annotations, rendered
      to a Helm values file (so values keep their exact YAML form, including
      numbers, booleans, and multi-line blocks). Leave empty to apply no custom
      annotations. NOTE: nginx.org/redirect-to-https is managed by the blueprint
      based on Ingress TLS (set to "false" when TLS is off, omitted when on) -
      do not set it here.
    default: {}
    display:
      group: networking
      index: 6
