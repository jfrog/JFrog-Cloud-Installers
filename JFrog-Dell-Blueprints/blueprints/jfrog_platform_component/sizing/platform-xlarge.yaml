artifactory:
  ##############################################################################################
  # The xlarge sizing
  # This size is intended for very large organizations. It can be increased with adding replicas
  # [WARNING] Some of the configuration mentioned in this file are taken inside system.yaml
  # hence this configuration will be overridden when enabling systemYamlOverride
  ##############################################################################################
  splitServicesToContainers: true
  artifactory:
    # Enterprise and above licenses are required for setting replicaCount greater than 1.
    # Count should be equal or above the total number of licenses available for artifactory.
    replicaCount: 4
  
    # Require multiple Artifactory pods to run on separate nodes
    podAntiAffinity:
      type: "hard"
  
    resources:
      requests:
        cpu: "2"
        memory: 14Gi
      limits:
        # cpu: "14"
        memory: 16Gi
  
    javaOpts:
      other: >
        -XX:InitialRAMPercentage=40
        -XX:MaxRAMPercentage=65
        -Dartifactory.async.corePoolSize=160
        -Dartifactory.async.poolMaxQueueSize=50000
        -Dartifactory.http.client.max.total.connections=150
        -Dartifactory.http.client.max.connections.per.route=150
        -Dartifactory.access.client.max.connections=150
        -Dartifactory.metadata.event.operator.threads=5
        -XX:MaxMetaspaceSize=512m
        -Djdk.nio.maxCachedBufferSize=1048576
        -XX:MaxDirectMemorySize=1024m
    tomcat:
      connector:
        maxThreads: 600
        extraConfig: 'acceptCount="1200" acceptorThreadCount="2" compression="off" connectionLinger="-1" connectionTimeout="120000" enableLookups="false"'
  
    database:
      maxOpenConnections: 150
  
    extraEnvironmentVariables:
      - name: MALLOC_ARENA_MAX
        value: "16"
  
  access:
    tomcat:
      connector:
        maxThreads: 150
    javaOpts:
      other: >
        -XX:InitialRAMPercentage=20
        -XX:MaxRAMPercentage=60
    database:
      maxOpenConnections: 150
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        # cpu: 1
        memory: 3Gi
    extraEnvironmentVariables:
      - name: MALLOC_ARENA_MAX
        value: "16"
  
  router:
    resources:
      requests:
        cpu: 400m
        memory: 1Gi
      limits:
        # cpu: "8"
        memory: 2Gi
  
  frontend:
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        # cpu: "3"
        memory: 2Gi
  
  metadata:
    database:
      maxOpenConnections: 150
    resources:
      requests:
        cpu: 200m
        memory: 200Mi
      limits:
        # cpu: "4"
        memory: 1Gi
  
  onemodel:
    resources:
      requests:
        cpu: 250m
        memory: 200Mi
      limits:
        # cpu: "4"
        memory: 1Gi
  
  event:
    resources:
      requests:
        cpu: 100m
        memory: 50Mi
      limits:
        # cpu: 500m
        memory: 250Mi
  
  observability:
    resources:
      requests:
        cpu: 100m
        memory: 50Mi
      limits:
        # cpu: 500m
        memory: 250Mi
  
  jfconnect:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        # cpu: 500m
        memory: 250Mi
  
  jfconfig:
    resources:
      requests:
        cpu: 100m
        memory: 1000Mi
      limits:
        memory: 1500Mi
    extraEnvironmentVariables:
      - name: MALLOC_ARENA_MAX
        value: "8"
  
  topology:
    resources:
      requests:
        cpu: 100m
        memory: 1000Mi
      limits:
        memory: 1500Mi
    extraEnvironmentVariables:
      - name: MALLOC_ARENA_MAX
        value: "8"
  
  nginx:
    mainConf: |
      # Main Nginx configuration file
      worker_processes  4;
      
      {{ if .Values.nginx.logs.stderr }}
      error_log  stderr {{ .Values.nginx.logs.level }};
      {{ else }}
      error_log  {{ .Values.nginx.persistence.mountPath }}/logs/error.log {{ .Values.nginx.logs.level }};
      {{ end }}
      pid        /var/run/nginx.pid;
      
      {{ if .Values.artifactory.ssh.enabled }}
      ## SSH Server Configuration
      stream {
        server {
          {{ if .Values.nginx.singleStackIPv6Cluster }}
          listen [::]:{{ .Values.nginx.ssh.internalPort }};
          {{ else }}
          listen {{ .Values.nginx.ssh.internalPort }};
          {{ end }}
          proxy_pass {{ include "artifactory.fullname" . }}:{{ .Values.artifactory.ssh.externalPort }};
        }
      }
      {{ end }}
      
      events {
        worker_connections  8192;
        use epoll;
        multi_accept on;
      }
      
      http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
      
        variables_hash_max_size 1024;
        variables_hash_bucket_size 64;
        server_names_hash_max_size 4096;
        server_names_hash_bucket_size 128;
        types_hash_max_size 2048;
        types_hash_bucket_size 64;
        proxy_read_timeout 2400s;
        client_header_timeout 2400s;
        client_body_timeout 2400s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 2400s;
        proxy_buffer_size 128k;
        proxy_buffers 40 128k;
        proxy_busy_buffers_size 128k;
        proxy_temp_file_write_size 250m;
        proxy_http_version 1.1;
        client_body_buffer_size 128k;
      
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
      
        log_format timing 'ip = $remote_addr '
        'user = \"$remote_user\" '
        'local_time = \"$time_local\" '
        'host = $host '
        'request = \"$request\" '
        'status = $status '
        'bytes = $body_bytes_sent '
        'upstream = \"$upstream_addr\" '
        'upstream_time = $upstream_response_time '
        'request_time = $request_time '
        'referer = \"$http_referer\" '
        'UA = \"$http_user_agent\"';
      
        {{ if .Values.nginx.logs.stdout }}
        access_log /dev/stdout timing;
        {{ else }}
        access_log {{ .Values.nginx.persistence.mountPath }}/logs/access.log timing;
        {{ end }}
      
        sendfile        on;
        #tcp_nopush     on;
      
        keepalive_timeout  65;
      
        #gzip  on;
      
        include /etc/nginx/conf.d/*.conf;
      
      }
    replicaCount: 2
    disableProxyBuffering: true
    resources:
      requests:
        cpu: "4"
        memory: "4Gi"
      limits:
        # cpu: "12"
        memory: "8Gi"
  
  postgresql:
    primary:
      extendedConfiguration: |
        max_connections = 2000
      affinity:
        # Require PostgreSQL pod to run on a different node than Artifactory pods
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - artifactory
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          memory: 128Gi
          cpu: "32"
        limits:
          memory: 128Gi
          # cpu: "64"
  
  evidence:
    resources:
      requests:
        cpu: 200m
        memory: 500Mi
      limits:
        # cpu: "2"
        memory: 1Gi
  
  rtfs:
    resources:
      requests:
        cpu: 500m
        memory: 3500Mi
      limits:
        # cpu: "2"
        memory: 3500Mi
  
  jfbus:
    resources:
      requests:
        cpu: 500m
        memory: 3500Mi
      limits:
        # cpu: "2"
        memory: 3500Mi
  
  platformfederation:
    resources:
      requests:
        cpu: 250m
        memory: 200Mi
      limits:
        # cpu: "4"
        memory: 2Gi
xray:
  ##############################################################
  # The xlarge sizing
  # This size is intended for large organizations. It can be increased with adding replicas or moving to the 2xlarge sizing
  ##############################################################
  
  replicaCount: 2
  databaseUpgradeReady: true
  waitForDatabase: true
  unifiedUpgradeAllowed: true
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 200
    targetMemoryUtilizationPercentage: 800
  
  xray:
    podAntiAffinity:
      ## Valid values are "soft" or "hard"; any other value indicates no anti-affinity
      type: "hard"
      topologyKey: "kubernetes.io/hostname"
  
  analysis:
    resources:
      requests:
        cpu: "100m"
        memory: 250Mi
      limits:
        # cpu: "4"
        memory: 10Gi
  
  indexer:
    resources:
      requests:
        cpu: "300m"
        memory: 550Mi
      limits:
        # cpu: "6"
        memory: 8Gi
  
  persist:
    resources:
      requests:
        cpu: "100m"
        memory: 250Mi
      limits:
        # cpu: "4"
        memory: 8Gi
  
  server:
    resources:
      requests:
        cpu: "300m"
        memory: 500Mi
      limits:
        # cpu: "4"
        memory: 6Gi
  
  router:
    resources:
      requests:
        cpu: "60m"
        memory: 100Mi
      limits:
        # cpu: "1"
        memory: 1Gi
  
  observability:
    resources:
      requests:
        cpu: "10m"
        memory: 25Mi
      limits:
        # cpu: "1"
        memory: 250Mi
  
  sbom:
    resources:
      requests:
        cpu: "100m"
        memory: 250Mi
      limits:
        # cpu: "4"
        memory: 10Gi
  
  policyenforcer:
    resources:
      requests:
        memory: "250Mi"
        cpu: "60m"
      limits:
        memory: "8Gi"
        # cpu: "4"
  
  # PostgreSQL
  ## Configuration values for the postgresql dependency
  ## ref: https://github.com/kubernetes/charts/blob/master/stable/postgresql/README.md
  ##
  postgresql:
  
    primary:
      resources:
        requests:
          memory: 64Gi
          cpu: "16"
        limits:
          memory: 64Gi
          # cpu: "32"
      extendedConfiguration: |
        max_connections = 1200
        listen_addresses = '*'
        max_wal_size = '4GB'
      affinity:
        # Require PostgreSQL pod to run on a different node than Xray pods
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - xray
              topologyKey: kubernetes.io/hostname
  
rabbitmq:
  extraConfiguration: |-
    vm_memory_high_watermark.absolute = 4G
    {{- if not .Values.global.xray.rabbitmq.haQuorum.enabled }}
    raft.wal_max_size_bytes = 1048576
    {{- end }}
  resources:
    requests:
      cpu: "200m"
      memory: 500Mi
    limits:
      # cpu: "4"
      memory: 5Gi

distribution:
  ##############################################################
  # The xlarge sizing
  # This size is intended for very large organizations. It can be increased with adding replicas
  ##############################################################
  
  unifiedUpgradeAllowed: true
  databaseUpgradeReady: true
  
  replicaCount: 2
  
  distribution:
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        # cpu: "4"
        memory: 3Gi
  
    extraEnvironmentVariables:
      - name: MALLOC_ARENA_MAX
        value: "2"
  
    javaOpts:
      other: >
        -XX:InitialRAMPercentage=40
        -XX:MaxRAMPercentage=70
        -XX:+UseStringDeduplication
        -XX:MaxMetaspaceSize=300m
        -Djdk.nio.maxCachedBufferSize=262144
        -XX:MaxDirectMemorySize=256m
  
  router:
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        # cpu: "1"
        memory: 1Gi
  
  observability:
    resources:
      requests:
        cpu: 25m
        memory: 50Mi
      limits:
        # cpu: "1"
        memory: 250Mi
  
  postgresql:
    primary:
      extendedConfiguration: |
        max_connections = 200
      affinity:
        # Require PostgreSQL pod to run on a different node than distribution pods
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - distribution
              topologyKey: kubernetes.io/hostname
      resources:
        requests:
          cpu: "100m"
          memory: 1Gi
        limits:
          # cpu: "2"
          memory: 8Gi

