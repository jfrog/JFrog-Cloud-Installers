---

tosca_definitions_version: dell_1_1

description: >
  Input Validator for the JFrog Platform deployment. Validates every
  user-provided input on the central deployment agent before the stack
  verifier or main deployment runs. Catches typos in secret names,
  malformed URLs, invalid Kubernetes quantities, and missing JSON
  keys in seconds rather than minutes.

imports:
  - dell/types/types.yaml
  - inputs/inputs.yaml
  - inputs/inputs_hidden.yaml
  - application/definitions.yaml

labels:
  csys-obj-type:
    values:
      - environment
  target_environment:
    values:
      - ece
  solution:
    values:
      - jfrog_platform_input_validator
  version:
    values:
      - "1.0"

blueprint_labels:
  env:
    values:
      - Dell
  csys-blueprint-type:
    values:
      - utility
