---

input_groups:
  credentials:
    display_label: Credentials
    collapsible: true
    index: 0
    inputs:
      - k8s_credentials
      - target_deployment_id
  infrastructure:
    display_label: Infrastructure
    collapsible: true
    index: 1
    inputs:
      - namespace
  persistence:
    display_label: Persistence
    collapsible: true
    index: 2
    inputs:
      - persistence
      - persistence_type
      - storage_class
      - pvc_size
      - nfs_ip
      - nfs_capacity
  database:
    display_label: Database Configuration
    collapsible: true
    index: 3
    inputs:
      - postgresql_enabled
      - database_admin_password
      - database_credentials
      - database_host
      - database_port
      - database_ssl_mode
  chart_settings:
    display_label: Chart Settings
    collapsible: true
    index: 4
    inputs:
      - release_name
      - master_key_secret_ref
      - join_key_secret_ref
  licensing:
    display_label: Sizing and Licensing
    collapsible: true
    index: 5
    inputs:
      - sizing_template
      - license_secret_ref
  networking:
    display_label: Ingress
    collapsible: true
    index: 6
    inputs:
      - nginx_enabled
      - ingress_enabled
      - ingress_class_name
      - ingress_host

inputs:

  k8s_credentials:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Cluster Access Secret
    description: |
      Secret name containing details needed for Kubernetes cluster.
      Required keys: host, port, verify_ssl, ssl_ca_cert.
      For verify_ssl='TLS': also requires cert_file, key_file.
      For verify_ssl='Token': also requires token.
    display:
      group: k8s_target_cluster
      index: 0

  target_deployment_id:
    type: deployment_id
    hidden: false
    allow_update: false
    required: true
    display_label: Target Infrastructure ID
    description: Deployment ID of the target Kubernetes infrastructure.
    display:
      group: k8s_target_cluster
      index: 1

  namespace:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Kubernetes Namespace
    description: Target namespace for JFrog Platform.
    default: jfrog-platform
    display:
      group: infrastructure
      index: 0

  persistence:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Persistence
    description: >-
      storage-type: Select a persistence type (file-system or nfs).
      storage-class: PVC-backed storage using a Kubernetes StorageClass.
    default: storage-class
    display:
      group: persistence
      index: 0

  persistence_type:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Persistence Type
    description: >-
      file-system: local or PVC-backed file storage.
      nfs: external NFS server mount.
    default: file-system
    display:
      group: persistence
      index: 1

  storage_class:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Storage Class
    description: Kubernetes StorageClass name for PVCs.
    default: ""
    display:
      group: persistence
      index: 2

  pvc_size:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: PVC Size
    description: PVC size for Artifactory persistence.
    default: "20Gi"
    display:
      group: persistence
      index: 3

  nfs_ip:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: NFS Server IP
    description: IP of the NFS server when persistence_type=nfs.
    default: ""
    display:
      group: persistence
      index: 4

  nfs_capacity:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: NFS Capacity
    description: Storage capacity for the NFS mount.
    default: "200Gi"
    display:
      group: persistence
      index: 5

  postgresql_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Bundled PostgreSQL
    description: Whether to deploy the bundled PostgreSQL subchart.
    default: "false"
    display:
      group: database
      index: 0

  database_admin_password:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Admin Password
    description: DAP general secret with the PostgreSQL admin password.
    display:
      group: database
      index: 2

  database_credentials:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Credentials
    description: >-
      DAP Basic Authentication secret name holding the 'username' and
      'password' for the PostgreSQL user.
    display:
      group: database
      index: 3
  database_host:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Host
    description: External PostgreSQL host.
    default: jfrog-platform-postgresql
    display:
      group: database
      index: 5

  database_port:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database Port
    description: External PostgreSQL port.
    default: "5432"
    display:
      group: database
      index: 6

  database_ssl_mode:
    type: string
    hidden: false
    allow_update: false
    required: true
    display_label: Database SSL Mode
    description: PostgreSQL SSL connection mode.
    default: disable
    display:
      group: database
      index: 7

  sizing_template:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Sizing Template
    description: >-
      Resource sizing profile. Tiers medium/large/xlarge/2xlarge require
      an Enterprise license; the validator enforces that
      create_license_secret=1 and license_secret_ref is set for those
      tiers.
    default: small
    display:
      group: licensing
      index: 0

  release_name:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: Helm Release Name
    description: Name of the Helm release.
    default: jfrog-platform

  license_secret_ref:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: License Secret
    description: DAP general secret with raw Artifactory license text.
    display:
      group: licensing
      index: 1

  master_key_secret_ref:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Master Key Secret
    description: >-
      DAP general secret with the raw Artifactory master key (exactly
      64 hex chars; openssl rand -hex 32). Validator enforces length
      and hex format.
    display:
      group: chart_settings
      index: 3

  join_key_secret_ref:
    type: string
    hidden: false
    allow_update: false
    required: false
    display_label: Join Key Secret
    description: >-
      DAP general secret with the raw Artifactory join key (exactly
      32 hex chars; openssl rand -hex 16). Validator enforces length
      and hex format.
    display:
      group: chart_settings
      index: 5

  nginx_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Bundled NGINX (LoadBalancer)
    description: Whether the chart's bundled NGINX is enabled.
    default: "true"
    display:
      group: networking
      index: 0

  ingress_enabled:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: Kubernetes Ingress
    description: Whether to enable a Kubernetes Ingress.
    default: "false"
    display:
      group: networking
      index: 1

  ingress_class_name:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Class Name
    description: Existing IngressClass name.
    default: nginx
    display:
      group: networking
      index: 3

  ingress_host:
    type: string
    hidden: false
    allow_update: true
    required: false
    display_label: Ingress Host
    description: DNS hostname for the Ingress resource.
    default: "artifactory.example.com"
    display:
      group: networking
      index: 4
