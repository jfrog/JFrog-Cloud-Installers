---

node_templates:

  input_validator:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          max_retries: 1
          implementation: application/scripts/validate_inputs.py
          executor: central_deployment_agent
          inputs:
            k8s_credentials: { get_input: k8s_credentials }
            target_deployment_id: { get_input: target_deployment_id }
            container_registry_credentials_secret: { get_input: container_registry_credentials_secret }
            namespace: { get_input: namespace }
            persistence: { get_input: persistence }
            persistence_type: { get_input: persistence_type }
            storage_class: { get_input: storage_class }
            pvc_size: { get_input: pvc_size }
            nfs_ip: { get_input: nfs_ip }
            nfs_capacity: { get_input: nfs_capacity }
            postgresql_enabled: { get_input: postgresql_enabled }
            apply_bundled_db_secret: { get_input: apply_bundled_db_secret }
            apply_external_db_secret: { get_input: apply_external_db_secret }
            database_admin_password: { get_input: database_admin_password }
            database_credentials: { get_input: database_credentials }
            database_host: { get_input: database_host }
            database_port: { get_input: database_port }
            database_ssl_mode: { get_input: database_ssl_mode }
            release_name: { get_input: release_name }
            chart_version: { get_input: chart_version }
            sizing_template: { get_input: sizing_template }
            jfrog_helm_repo_url: { get_input: jfrog_helm_repo_url }
            container_registry_name: { get_input: container_registry_name }
            apply_license_secret: { get_input: apply_license_secret }
            license_secret_ref: { get_input: license_secret_ref }
            apply_master_key_secret: { get_input: apply_master_key_secret }
            master_key_secret_ref: { get_input: master_key_secret_ref }
            apply_join_key_secret: { get_input: apply_join_key_secret }
            join_key_secret_ref: { get_input: join_key_secret_ref }
            create_pull_secret: { get_input: create_pull_secret }
            nginx_enabled: { get_input: nginx_enabled }
            ingress_enabled: { get_input: ingress_enabled }
            ingress_tls_enabled: { get_input: ingress_tls_enabled }
            ingress_class_name: { get_input: ingress_class_name }
            ingress_host: { get_input: ingress_host }
            expected_basic_auth_keys: { get_input: expected_basic_auth_keys }

capabilities:

  # Derived 0/1 integers exposed for the orchestrator to forward into the
  # downstream ServiceComponents, whose scalable.default_instances need an
  # integer resolvable at plan time. The validator node computes these from
  # the true/false toggles during its precreate lifecycle.
  apply_bundled_db_secret_int:
    description: 1 if the bundled PostgreSQL secret should be created, else 0.
    value: { get_attribute: [input_validator, apply_bundled_db_secret_int] }
  apply_external_db_secret_int:
    description: 1 if the external DB secret should be created, else 0.
    value: { get_attribute: [input_validator, apply_external_db_secret_int] }
  apply_license_secret_int:
    description: 1 if the license K8s secret should be created, else 0.
    value: { get_attribute: [input_validator, apply_license_secret_int] }
  apply_master_key_secret_int:
    description: 1 if the master-key secret should be injected, else 0.
    value: { get_attribute: [input_validator, apply_master_key_secret_int] }
  apply_join_key_secret_int:
    description: 1 if the join-key secret should be injected, else 0.
    value: { get_attribute: [input_validator, apply_join_key_secret_int] }
  create_pull_secret_int:
    description: 1 if the image pull secret should be created, else 0.
    value: { get_attribute: [input_validator, create_pull_secret_int] }
  ingress_tls_enabled_int:
    description: 1 if Ingress TLS is enabled, else 0.
    value: { get_attribute: [input_validator, ingress_tls_enabled_int] }
  discover_lb_endpoint:
    description: 1 if the LoadBalancer endpoint should be discovered (bundled NGINX), else 0.
    value: { get_attribute: [input_validator, discover_lb_endpoint] }
