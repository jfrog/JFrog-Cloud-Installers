# Example: Air-Gapped Deployment
#
# Demonstrates how to deploy the JFrog Platform in an air-gapped
# environment where external Helm chart repositories and Docker
# registries are not reachable.  All external URLs are pointed at
# internal mirrors via the new top-level inputs.
#
# Prerequisites:
#   1. Internal Helm chart mirror that hosts the jfrog-platform and
#      ingress-nginx charts (e.g., your own Artifactory chart repo).
#   2. Internal container registry that mirrors the stack-verifier
#      base image (default: dtzar/helm-kubectl:3.19).
#   3. DAP basic_auth secret with credentials for the internal
#      registry (only required if the registry needs auth).
#   4. DAP Kubernetes credentials secret with proxy_settings.

inputs:

  # ── Credentials ──────────────────────────────────────────────────
  k8s_credentials: my-k8s-secret
  target_deployment_id: my-cluster-deployment
  container_registry_credentials_secret: my-registry-creds   # optional

  # ── Infrastructure ───────────────────────────────────────────────
  namespace: jfrog-platform

  # ── Database ─────────────────────────────────────────────────────
  postgresql_enabled: "true"
  create_bundled_db_secret: 1

  # ── Chart Settings ──────────────────────────────────────────────
  release_name: jfrog-platform
  sizing_template: small
  ingress_nginx_repo_url: https://charts.internal.example.com/ingress-nginx
  jfrog_helm_repo_url: https://charts.internal.example.com/jfrog
  container_registry_name: registry.internal.example.com

  # ── Networking ──────────────────────────────────────────────────
  nginx_enabled: "true"
