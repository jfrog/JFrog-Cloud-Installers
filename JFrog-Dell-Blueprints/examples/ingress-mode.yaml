# Example: Kubernetes Ingress Mode (no bundled NGINX)
#
# Exposes Artifactory via a Kubernetes Ingress resource instead of the
# bundled NGINX LoadBalancer.  Optionally installs the ingress-nginx
# controller (the controller is now a separate component blueprint
# that is deployed only when install_ingress_controller=1).
#
# Prerequisites:
#   1. DAP Kubernetes credentials secret (with proxy_settings for SaaS DAPO).
#   2. DAP target infrastructure deployment.
#   3. DNS record pointing ingress_host to the ingress controller's
#      external IP/LB (after the deployment if you install the
#      controller as part of this blueprint).

inputs:

  # ── Credentials ──────────────────────────────────────────────────
  k8s_credentials: my-k8s-secret
  target_deployment_id: my-cluster-deployment

  # ── Infrastructure ───────────────────────────────────────────────
  namespace: jfrog-platform

  # ── Database ─────────────────────────────────────────────────────
  postgresql_enabled: "true"
  create_bundled_db_secret: 1

  # ── Licensing ────────────────────────────────────────────────────
  create_license_secret: 0                # Trial mode

  # ── Chart Settings ──────────────────────────────────────────────
  release_name: jfrog-platform
  sizing_template: small

  # ── Networking (Ingress mode) ───────────────────────────────────
  nginx_enabled: "false"
  ingress_enabled: "true"
  install_ingress_controller: 1           # Yes — deploy ingress-nginx component
  ingress_class_name: nginx
  ingress_host: artifactory.example.com
