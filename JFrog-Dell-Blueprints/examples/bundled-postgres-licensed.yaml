# Example: Bundled PostgreSQL + Licensed
#
# Same as the trial example but with a license applied at deploy time.
# The license is stored in a DAP general secret and written to a
# Kubernetes Secret before the Helm install.
#
# Prerequisites:
#   1. DAP Kubernetes credentials secret (type: k8s) with proxy_settings
#      for SaaS DAPO compatibility.
#   2. Target infrastructure deployment (Kubernetes cluster).
#   3. DAP general secret (e.g., "artifactory-license") containing the
#      raw Artifactory license text.
#
# DAP UI steps:
#   1. k8s_target_cluster    → select Target Kubernetes Type
#                            → select Kubernetes credentials secret
#                            → select the Target Kubernetes Deployment
#   2. Database Configuration → set Bundled PostgreSQL to "true"
#                            → set Create Bundled Database Secret to "true"
#   3. Sizing and Licensing  → set Create License Secret to "true"
#                            → select the license secret
#   4. Click Deploy
#
# Access URL output:
#   - platform_url_loadbalancer -> http://<lb-ip> (active, bundled NGINX mode)
#   - platform_url_ingress      -> empty (LoadBalancer mode)

inputs:

  # -- k8s target cluster ------------------------------------------
  target_type: External
  k8s_credentials: my-k8s-secret
  target_deployment_id: my-cluster-deployment

  # -- Infrastructure ----------------------------------------------
  namespace: jfrog-platform

  # -- Database (bundled) ------------------------------------------
  postgresql_enabled: "true"
  create_bundled_db_secret: "true"

  # -- Sizing and Licensing ----------------------------------------
  sizing_template: small
  create_license_secret: "true"
  license_secret_ref: artifactory-license

  # -- Chart Settings ----------------------------------------------
  release_name: jfrog-platform

  # -- Ingress -----------------------------------------------------
  nginx_enabled: "true"
