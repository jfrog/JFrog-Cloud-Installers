# Example: Bundled PostgreSQL + Trial License
#
# Simplest deployment — uses the bundled PostgreSQL subchart and starts
# Artifactory in trial mode. Intended for dev / test / single-replica use.
#
# Prerequisites:
#   1. A DAP Kubernetes credentials secret (type: k8s).
#      For SaaS DAPO, the secret must include:
#        configuration:
#          proxy_settings:
#            disable: false
#            auto_resolve: true
#   2. A target infrastructure deployment in DAP (Kubernetes cluster
#      target_deployment_id).
#
# DAP UI steps:
#   1. k8s_target_cluster → select Target Kubernetes Type (External / AI)
#                         → select your Kubernetes credentials secret
#                         → select the Target Kubernetes Deployment
#   2. Database Configuration → set Bundled PostgreSQL to "true"
#                            → set Apply Bundled Database Secret to "true"
#   3. Leave all other groups at their defaults
#   4. Click Deploy
#
# Access URL output:
#   - platform_url_loadbalancer -> http://<lb-ip> (active, bundled NGINX mode)
#   - platform_url_ingress      -> empty (LoadBalancer mode)
#
# Notes:
#   - Bundled mode writes the well-known default credentials
#     (postgres / artifactory / artifactory) — TRIAL / DEV only.
#   - All toggle inputs are "true" / "false" strings.

inputs:

  # -- k8s target cluster (required) -------------------------------
  target_type: External                       # External | AI
  k8s_credentials: my-k8s-secret              # DAP secret name (type: k8s)
  target_deployment_id: my-cluster-deployment # DAP infrastructure deployment ID

  # -- Infrastructure ----------------------------------------------
  namespace: jfrog-platform

  # -- Database (bundled) ------------------------------------------
  postgresql_enabled: "true"
  apply_bundled_db_secret: "true"

  # -- Sizing and Licensing ----------------------------------------
  sizing_template: small                      # single replica, trial-capable
  apply_license_secret: "false"              # trial mode

  # -- Chart Settings ----------------------------------------------
  release_name: jfrog-platform

  # -- Ingress -----------------------------------------------------
  nginx_enabled: "true"                       # bundled NGINX / LoadBalancer mode
